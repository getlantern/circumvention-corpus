censors:
    - cn
defense_implications:
    - 'Exploit platform-architectural blind spots: embedding sensitive content in comment threads rather than top-level posts may substantially reduce censorship exposure if the parent tweet avoids direct keyword matches.'
    - Censorship architecture that cascades deletions from parent to child (but not the reverse) is a systematic structural weakness; tool designs that route communications through less-monitored structural positions (replies, metadata, image captions) can reduce surface area.
