defense_implications:
    - Throttle Collage task inter-request timing to match the empirical distribution of normal user behavior on the same platform, defeating clickstream anomaly detection without requiring formal traffic-shaping infrastructure.
    - Partition users into small groups with distinct identifier-key spaces so that a censor who joins as a user can only learn content locations for one group, limiting the blast radius of a sybil or infiltration attack.
