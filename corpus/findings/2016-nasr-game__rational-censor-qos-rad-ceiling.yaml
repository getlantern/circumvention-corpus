defense_implications:
    - Deploy sufficient decoy ASes to push any QoS-cautious censor above its collateral-damage tolerance; the game-theoretic floor (~27% usable routes for China) is an achievable target for decoy coverage.
    - Model censors as QoS-cautious rather than irrational when sizing deployment budgets—the political cost of widespread unreachability is the primary practical limit on RAD.
