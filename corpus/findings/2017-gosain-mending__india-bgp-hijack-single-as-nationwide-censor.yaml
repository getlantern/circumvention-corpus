defense_implications:
    - BGP hijacking redirects traffic at the routing layer regardless of transport encryption; circumvention tools must implement strict TLS certificate or public-key pinning so that connections redirected to a censor-controlled endpoint fail authentication rather than being silently intercepted.
    - Distribute circumvention server credentials out-of-band and pin them in the client binary — IP-address changes triggered by a hijack will cause pinned clients to fail loudly rather than connect to a spoofed endpoint.
