abstract: |
  47-page report from Justice for Myanmar drawing on the Geedge/MESA
  leak to document the export of Chinese GFW-derived surveillance
  technology to Myanmar's military regime via the Belt and Road
  framework. Identifies specific deployments and the corporate channels
  through which Geedge Networks supplied the regime.

