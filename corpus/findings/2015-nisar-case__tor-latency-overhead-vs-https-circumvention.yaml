defense_implications:
    - When anonymity is not required, avoid onion-routing paths; latency-optimized direct or single-hop relay circumvention will deliver meaningfully better user experience.
    - If Tor must be used, pre-select circuits by exit-relay latency and avoid circuit rotation during active browsing sessions to reduce tail latency.
