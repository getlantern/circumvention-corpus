summary: 'Within a single country mandate, different ISPs implement censorship with different filtering tools and mechanisms: Thailand''s AS 9737 and AS 17552 use structurally distinct block-page templates (vector 17 is ~1,000 bytes using div layout; vector 8 is ~6,000 bytes using table layout). Both ISPs actively obfuscate their filtering product by reporting generic ''Server: Apache/2.2.9 (Debian)'' or ''Server: Apache'' HTTP headers instead of the actual product identifier.'
