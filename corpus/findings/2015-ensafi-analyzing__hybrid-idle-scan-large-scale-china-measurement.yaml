defense_implications:
    - Circumvention researchers can use hybrid idle scans for large-scale reachability audits of relay infrastructure from within censored networks without needing in-country volunteers or proxies.
    - The technique's sensitivity to SYN/ACK directionality makes it well-suited for confirming whether a newly deployed relay IP/port pair is being blocked inbound before committing it to a bridge distribution system.
