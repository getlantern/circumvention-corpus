paper: 2021-wei-domain
kind: defense
summary: Active-probing censors who discover a shadow domain can be defeated by adding a CDN rule that only fetches from the blocked back-end when a secret custom request header is present; without it the CDN returns an innocuous response. Layering domain fronting over domain shadowing (DfDs) further hides the shadow domain by routing the initial request through an allowed front domain with the Host header set to the shadow domain, so the censor never sees the shadow domain in the SNI or DNS query even during active inspection.
techniques:
    - active-probing
    - sni-blocking
defenses:
    - domain-fronting
    - tunneling
censors:
    - generic
defense_implications:
    - Add a CDN-enforced secret-header check to any domain-shadowing deployment; without it, an active-probing censor that discovers the shadow domain will confirm the blocked content and can immediately block it.
    - Layer DfDs (domain fronting + domain shadowing) so the shadow domain is never exposed in SNI or DNS — the censor observes only a TLS connection to the allowed front domain regardless of probing.
