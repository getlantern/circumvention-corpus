defense_implications:
    - Censorship measurement from data-center IPs systematically under-detects ISP-level filtering; circumvention tools should validate reachability of their own infrastructure from residential endpoints, not just VPS nodes, in decentralized censorship environments.
    - Centralized national censorship (e.g., GFW) is more consistently detectable from any vantage point, while decentralized ISP-level censorship requires per-carrier testing — a critical design consideration for tools that rely on vantage-point data to make routing decisions.
