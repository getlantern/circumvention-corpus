defense_implications:
    - Prefer the phantom-host (Conjure) architecture over decoy-site hijacking (TapDance) for any deployment requiring upload-heavy use cases or long-lived connections — the 1400x upload advantage alone justifies migration.
    - Eliminate connection-window constraints by owning the full phantom-host TCP stack rather than hijacking mid-stream decoy connections, enabling unlimited connection duration.
