defense_implications:
    - Tools that probe censors from a fixed IP should intersperse legitimate traffic after each anomalous probe — a minimal one-flow interleave is sufficient to reset sequential detectors without triggering history-penalized resets.
    - Automated traffic generation tools (e.g., Harpoon) are themselves fingerprint risks when used against real-world censors; real user browsing traffic is the preferred cover for the normal-traffic injection phase.
