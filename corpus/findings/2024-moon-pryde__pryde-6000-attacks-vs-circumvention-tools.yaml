defense_implications:
    - Do not rely on genetic-algorithm circumvention tools (Geneva-style) as a complete audit of what packet sequences evade a censor's stateful infrastructure — they miss the overwhelming majority of exploitable states.
    - Use model-guided black-box inference (Pryde-style) to enumerate firewall-specific evasion sequences before assuming a given path through a censor is truly blocked.
