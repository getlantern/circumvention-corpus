summary: 'A sophisticated censor can infiltrate a proxy distribution system, accumulate large numbers of proxy addresses and channel identities, and delay mass-blocking for weeks or months to maximize information before acting. The paper argues this is self-limiting: delayed blocking extends proxy lifetimes (benefiting system yield), and the infiltrating account''s subtree reputation score degrades sharply the moment it begins blocking proxies, triggering exclusion from future proxy assignments.'
