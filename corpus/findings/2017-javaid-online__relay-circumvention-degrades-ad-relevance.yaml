defense_implications:
    - Circumvention tools that route all traffic through a single relay impose an invisible economic cost on publishers (lost ad revenue); split-path designs that preserve direct-path ad requests reduce this externality and create deployment incentives.
    - Measuring ad-relevance degradation is a practical proxy for detecting location-leakage in relay selection — use it as a canary when evaluating new relay infrastructure.
