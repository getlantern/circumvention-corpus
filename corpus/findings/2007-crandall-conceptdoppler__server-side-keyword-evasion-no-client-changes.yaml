summary: 'When the GFC keyword blacklist is known, multiple server-side-only evasion techniques become viable requiring no client modification: IP packet fragmentation to split keywords across MTU boundaries, HTML comment injection mid-keyword (e.g., ''Fa<!- Comment ->lun Gong''), alternative URL percent-encodings (e.g., ''F%61lun Gong''), and spam-style character substitution (''F@1un G0-ng''); the GFC implementation was observed not to check control characters in URL requests.'
