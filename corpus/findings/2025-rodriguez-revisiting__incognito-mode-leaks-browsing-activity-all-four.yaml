defense_implications:
    - Circumvention tool documentation must explicitly state that Chinese browser incognito modes do not prevent browsing activity exfiltration; incognito is not a substitute for a privacy-respecting browser when used alongside a VPN.
    - PWA-based circumvention or encrypted-chat tools accessed via Chinese browsers in incognito mode should warn users that page titles and URLs are still logged to vendor servers, and consider redirecting users to a recommended browser before presenting sensitive functionality.
