defense_implications:
    - India's Internet is structurally ready for GFW-style centralized filtering with minimal new infrastructure; circumvention tools should treat India as a potential high-censorship environment and have protocol hardening (traffic randomization, mimicry) ready to activate rapidly.
    - Monitor BGP announcements from AS9498 and AS4755 as early-warning signals of centralized filtering deployment — these two ASes alone control 70% of the required filtering routers.
