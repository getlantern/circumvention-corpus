defense_implications:
    - Set micropayment amounts for censorship-resistant storage servers above the combined storage and bandwidth cost floor — underpaying creates rational incentives to defect that no protocol enforcement can overcome.
    - Use Poisson-distributed audit times to prevent servers from estimating the auditor-to-user ratio (BR) accurately enough to profitably refuse non-audit traffic.
