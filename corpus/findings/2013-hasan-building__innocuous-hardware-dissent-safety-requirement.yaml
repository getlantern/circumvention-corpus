defense_implications:
    - Circumvention tools should run exclusively on commodity hardware (smartphones, standard computers) and must not require users to acquire or install any non-standard radio equipment.
    - Avoid designs that require rooftop antennas, unlicensed-band equipment outside standard WiFi, or any hardware whose presence alone could constitute evidence of dissent.
