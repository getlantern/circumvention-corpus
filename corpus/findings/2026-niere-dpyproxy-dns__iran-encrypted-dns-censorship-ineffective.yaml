defense_implications:
    - Deploying encrypted DNS (DoQ or DoT/DoH with SNI omitted) as the default for Iranian users is sufficient to bypass DNS censorship with no special server-side infrastructure — all 47 tested encrypted DNS resolvers support certificate validation without SNI.
    - Configure DNS clients to omit the SNI extension in TLS handshakes with DNS servers; this single change converts most censored encrypted-DNS connections in Iran into working ones.
