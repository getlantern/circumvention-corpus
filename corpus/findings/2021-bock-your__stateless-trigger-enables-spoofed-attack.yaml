    - ir
    - kz
defense_implications:
    - Circumvention proxies that rely on IP-keyed reputation are vulnerable to stateless spoofed triggering; consider challenge-response or sequence-number validation at proxy entry to detect spoofed trigger attempts.
    - Monitor for the 'all SYNs dropped to a fixed 4-tuple' pattern as an early signal of active weaponization; surface it to clients so they rotate endpoints rather than retrying on the poisoned tuple.
