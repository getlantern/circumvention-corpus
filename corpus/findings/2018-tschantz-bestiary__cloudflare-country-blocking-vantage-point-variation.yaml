defense_implications:
    - Circumvention infrastructure should rotate across diverse ASNs and IP ranges — a single VPN provider's exit pool may face systematically elevated blocking even when geographically targeting the same destination.
    - Measurement studies must account for vantage-point IP reputation as a confound; observed block rates may reflect the proxy's reputation rather than the client's perceived location.
