notes: |
  Operator-side primary source — distinct angle from academic
  measurement papers (which observe censor mechanisms from the
  client side) or NGO reports (which focus on policy and human-rights
  framing). This perspective documents what circumvention-tool
  *operators* see when authorities apply administrative pressure on
  upstream infrastructure: not packet-level DPI changes, but
  resource-availability changes that ripple through commercial
  reseller ecosystems.

  Implications for Lantern: the cn-targeted enforcement model
  documented here is administrative + economic (拔线 + 涨价), not
  purely technical. Resilient circumvention infrastructure for CN
  users needs IP/ASN diversity at a scale that survives waves of
  enforcement, not just protocol-level evasion of any single DPI
  signature.
