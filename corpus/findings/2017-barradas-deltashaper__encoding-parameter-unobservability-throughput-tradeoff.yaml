defense_implications:
    - 'Steganographic capacity in compressed video carriers is severely limited by codec optimization (macroblocks, inter-frame compression): designers should experimentally map the unobservability-throughput Pareto frontier for each target application and codec version, since analytical models are intractable.'
    - Encoding parameters that trade throughput for error resilience (larger cells, lower bit depth, lower fps) simultaneously improve unobservability — the same knobs serve both goals, so calibration can optimize for unobservability without a separate error-correction tuning pass.
