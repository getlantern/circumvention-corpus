defense_implications:
    - Any circumvention tool relying on standard DNS will receive false IPs; use DNS-over-HTTPS or DNS-over-TLS, or hardcode IP addresses, to bypass the DNS-layer censorship entirely.
    - 'The centralized pool of 8 known bad IPs can be used as a detection oracle: a client receiving one of these IPs for a queried domain can confirm DNS tampering without external ground truth.'
