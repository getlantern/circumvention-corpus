defense_implications:
    - A censor already deploying throttling as a censorship mechanism (Iran, Russia, China) can cheaply extend that infrastructure to fingerprint Hysteria/Brutal at near-zero cost — the detection is a byproduct of existing throttling equipment.
    - Circumvention tools that operate over QUIC should expose a standard BBR mode and make it the default, since active throttling can still distinguish any CCA that does not reduce its send rate on detected bandwidth drops.
