defense_implications:
    - India's decentralized, inconsistent blocklist implementation means circumvention tool designers cannot assume uniform blocking — a proxy endpoint blocked on Airtel may be reachable on Jio, making ISP-specific fallback routing a viable strategy.
    - The large variance in blocking coverage across smaller ISPs suggests that using infrastructure hosted in IP space not on the largest ISPs' blocklists may provide reliable access without active circumvention.
