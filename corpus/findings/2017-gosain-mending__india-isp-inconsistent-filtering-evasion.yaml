defense_implications:
    - Circumvention tools targeting India can exploit ISP-level inconsistency by probing which ISP a user is on and calibrating obfuscation aggressiveness accordingly — heavy obfuscation may not be needed for many Indian ISPs today.
    - Bootstrap servers should maintain per-ISP reachability data for India so that clients are routed to endpoints that are reachable from their specific carrier.
