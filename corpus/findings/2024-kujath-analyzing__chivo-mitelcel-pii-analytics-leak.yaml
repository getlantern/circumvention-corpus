defense_implications:
    - Circumvention tools must audit all bundled third-party SDKs (analytics, crash reporting, engagement) for PII exfiltration — even apps from sovereign governments and dominant telcos routinely leak credentials to external analytics services.
    - For at-risk users, VPN/proxy tools should flag or intercept analytics endpoints that receive keystroke or form-field events, since these covert PII channels persist even when all other traffic is tunneled.
