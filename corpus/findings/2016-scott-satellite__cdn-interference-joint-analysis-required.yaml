defense_implications:
    - Domain-fronting designs must account for the fact that the same CDN IP used for fronting may also appear in censor block-page clusters in other countries, causing false-positive blocking alerts — use multi-domain co-resolution clustering rather than single-IP trust checks.
    - Circumvention infrastructure audits should run Satellite-style joint CDN/interference analysis to verify that CDN IPs being used for fronting are not already appearing in censor-country block clusters.
