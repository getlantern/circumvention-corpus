defense_implications:
    - Circumvention clients with retry logic should wait at least 120 seconds after a blocked connection before reusing the same server, to avoid stateful DPI state bleeding into subsequent connections.
    - Stateful blocking that resets within 2 minutes means rapid connection cycling to the same endpoint will repeatedly trigger detection; implement exponential backoff rather than fast retry.
