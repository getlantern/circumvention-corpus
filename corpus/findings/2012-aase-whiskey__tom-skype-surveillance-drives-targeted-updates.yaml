censors:
    - cn
defense_implications:
    - Chinese chat clients that download keyword lists to the device and perform local surveillance represent a qualitatively higher threat model than server-side-only filtering; circumvention tool design must treat on-device keyword detection as a distinct attack surface.
    - Non-surveillance platforms that lack client-side logging may receive slower or less targeted keyword updates, providing a temporary window before event-specific terms are added — but this cannot be relied upon as a durable evasion strategy.
