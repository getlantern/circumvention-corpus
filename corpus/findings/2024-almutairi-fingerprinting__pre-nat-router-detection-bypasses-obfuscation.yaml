defense_implications:
    - Payload obfuscation (obfs4, Shadowsocks, pluggable transports) provides zero protection against this detector — circumvention tools must address the IP-destination distribution pattern, not just the packet content.
    - ISP-provisioned home routers represent a previously unconsidered deployment surface for censor-supplied firmware; circumvention tool threat models should account for adversarial infrastructure at the LAN gateway, not only on-path middleboxes.
