defense_implications:
    - Piggybacking on a high-value commercial service (Skype, WhatsApp, etc.) raises the political and economic cost of blocking enough to deter unsophisticated censors; build circumvention as a plugin/overlay rather than standalone software.
    - End-to-end encryption provided by the host overlay can substitute for transport-layer encryption in the circumvention layer, reducing implementation complexity.
