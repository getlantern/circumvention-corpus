defense_implications:
    - Embed a content-size ratio check (threshold ~0.3× global average) in circumvention clients as a lightweight first-pass detector for in-path HTTP blockpage injection, avoiding the need to maintain a curated uncensored baseline.
    - Deploy distributed probes at multiple ISPs per target country before selecting an evasion layer — ISP-level heterogeneity means a single country-wide technique assumption will miss or over-engineer the fix.
