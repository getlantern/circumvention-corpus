defense_implications:
    - A 1:6–1:12 message-to-carrier ratio is the practical bandwidth budget for JPEG steganography; protocol designers should size cover image selection and parallelism (multiple circuits) to achieve acceptable throughput rather than tuning the embedding algorithm alone.
    - Parallelize StegoTorus-style circuits (4 concurrent circuits showed meaningful throughput gains) to compensate for the inherent bandwidth overhead of steganographic encoding.
