defense_implications:
    - Do not rely on client PoW puzzles as the primary gate against active probing; shared secrets or asymmetric cryptographic challenges that require server-side state are necessary to exclude probes that have no legitimate credential.
    - 'Bridge churn rate is the binding constraint on any rate-limiting defense: if new bridge IPs arrive slower than a censor can probe them, exhaustion-based defenses fail regardless of per-probe cost.'
