defense_implications:
    - Account for real-world network bottlenecks when designing and evaluating padding strategies — bursty padding defenses optimized for unconstrained bandwidth can degrade user experience catastrophically under congested links.
    - Prefer padding defenses with rate awareness or backpressure mechanisms over burst-at-trace-start designs to avoid self-induced congestion that inflates delay overhead by hundreds of percent.
