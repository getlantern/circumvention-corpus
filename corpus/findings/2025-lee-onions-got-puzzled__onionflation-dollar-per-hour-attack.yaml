defense_implications:
    - Do not rely solely on PoW client puzzles as a DoS defense for onion services; the puzzle difficulty signal can be gamed by a low-cost adversary who inflates it without triggering congestion-based countermeasures.
    - Complement puzzle difficulty with congestion-independent admission controls (e.g., per-introduction-point rate limits or cryptographic tokens) so difficulty inflation is decoupled from actual service load.
