defense_implications:
    - Route non-censored content directly rather than through proxies — nearly half of proxy capacity may be consumed by traffic that requires no circumvention at all.
    - Integrate CDN cache-fetching (CacheBrowsing) as a first-pass filter to offload ~41% of proxy bandwidth before any proxy connection is opened.
