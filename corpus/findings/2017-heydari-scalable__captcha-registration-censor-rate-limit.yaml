defense_implications:
    - Registration rate-limiting via time-gated multi-step CAPTCHAs is a necessary complement to IP rotation — without it, adversaries can automate censor provisioning at a rate that overwhelms the swarming ratio defense.
    - Periodic global registration resets (e.g., every 12 hours) amortize the human cost of censor maintenance, forcing adversaries to repeat expensive registration for every censor at each reset, not just at initial deployment.
