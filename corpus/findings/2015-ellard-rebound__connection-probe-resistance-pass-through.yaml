defense_implications:
    - Decoy-routing designs that terminate and spoof the client–decoy connection must either detect and block all probe variants (TCP in-window data, ICMP Record Route, 0trace TTL probes) or adopt a Rebound-style pass-through architecture to eliminate the probe surface entirely.
    - A censor willing to send TTL-limited clone packets via an alternate path can defeat any scheme that closes the real decoy connection — consider this in threat modelling.
