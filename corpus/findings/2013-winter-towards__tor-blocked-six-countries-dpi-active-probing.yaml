defense_implications:
    - Proxy designs must resist both passive DPI fingerprinting and active probing simultaneously — a transport that defeats one but not the other will still be blocked.
    - IP blocklisting of known relay/bridge IPs is a baseline censor capability; bridges must be distributed out-of-band and rotated to avoid enumeration.
