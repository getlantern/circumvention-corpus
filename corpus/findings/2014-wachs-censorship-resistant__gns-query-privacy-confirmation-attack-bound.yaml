defense_implications:
    - Encrypt all proxy-directory lookups with keys derived from both the directory entry's public key and the queried label so that a network observer learns nothing from observed lookup traffic alone.
    - Design directory or bridge-distribution systems so that confirmation of a specific entry requires the adversary to already know which entry to confirm — passive bulk collection yields no actionable intelligence.
