defense_implications:
    - Trust-restricted bridge distribution (friend-to-friend or invitation-only) substantially reduces censor infiltration and DoS attack surface versus publicly advertised proxies; pair with per-client connection/bandwidth limits as a secondary defense.
    - Identifier rotation is much cheaper in overlay networks than in IP space — designing circumvention systems around rotatable application-layer IDs rather than IP addresses dramatically lowers recovery cost after a server is burned.
