id: 2026-rks-russian-apps-vpn-detection
title: "Russian Apps Search for VPNs: A Survey of Mandated VPN-Detection in 30 Popular Russian Android Apps"
authors:
  - RKS Global
venue: RKS Global (research report)
year: 2026
url: "https://files.rks.global/russian_apps_search_for_vpn_en.pdf"
abstract: |
  Analysis of 30 popular Russian Android apps following Ministry of
  Digital Development guidelines requiring apps to restrict access from
  VPN-using devices starting April 15 2026. Findings: 22 of 30 apps
  detect VPN status; 19 of those send the detected status to the
  server. 11 apps received a "RED" rating (maximum surveillance). The
  most aggressive class is banking apps (Sber, T-Bank, VTB, Alfa-Bank)
  which combine VPN detection with behavioral biometrics (screen
  pressure, touch coordinates, gesture timing) for cross-account
  re-identification of users behind proxies. Anti-analysis features
  observed in T-Bank, Yandex services, and MAX actively search for
  research tooling on the device.
censors: [ru]
techniques: [tls-fingerprint, traffic-shape, ml-classifier, middlebox-interference]
evaluation_methods: [measurement-study]
