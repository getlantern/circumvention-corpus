defense_implications:
    - Hardcode IP addresses or use DNS-independent bootstrapping so clients can reach proxies without relying on valid DNS resolution in a censored environment.
    - Treat foreign DNS resolvers as untrusted in high-censorship environments; a censor that controls upstream routing can poison responses regardless of which resolver the client queries.
