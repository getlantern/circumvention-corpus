id: 2025-himmelberger-drivel
title: "Drivel: A Quantum-Safe Fully Encrypted Protocol Proxy"
authors:
  - Marc Himmelberger
venue: ETH Zurich (MSc thesis)
year: 2025
url: "https://lists.torproject.org/mailman3/hyperkitty/list/tor-dev@lists.torproject.org/thread/S6FMLIOYAOXODC2MEQIXKFQ6YSRX2JXA/"
abstract: |
  MSc thesis from ETH Zurich on implementing and evaluating quantum-safe
  fully encrypted protocols. Designs Drivel — an obfs4-style fully
  encrypted protocol with post-quantum cryptographic primitives — and
  evaluates it against the GFW's fully-encrypted-traffic detector and
  the post-quantum threat model. Forwarded to the tor-dev mailing list
  in late 2025.
censors: [cn, generic]
techniques: [fully-encrypted-detect, random-payload-detect]
defenses_discussed: [obfs4, scramblesuit, randomization]
core: false
visibility: public
date_added: "2026-05-05"
added_by: afisk
sources:
  - "url:https://github.com/net4people/bbs/issues/542"
references:
  - 2023-wu-fully-encrypted-detect
notes: |
  Forward-looking work — most circumvention protocols still rely on
  pre-quantum primitives (X25519, AES-GCM). Drivel is one of the first
  serious treatments of how fully-encrypted protocols evolve once
  post-quantum becomes a deployment requirement. Lantern relevance:
  any new protocol Lantern designs (Reflex, Unbounded, etc.) should
  factor in PQ migration; this thesis is the closest reference for
  doing it in a circumvention context.
