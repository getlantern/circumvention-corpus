defense_implications:
    - CDN-based proxying (domain fronting, coralized URLs) can bypass host-specific DNS and HTTP blocks if the CDN's IP range is not itself blocked — monitor CDN reachability as a fallback channel.
    - Cache-based access degrades over time as censors add CDN IP ranges to blocklists; treat it as a temporary bypass, not a durable architecture.
