summary: 'IP blocking in Myanmar was non-deterministic within individual ASes: Frontiir (AS58952) blocked Facebook''s IP 157.240.15.36 but not 31.13.82.36, indicating ISPs used incomplete address lists. Different websites were blocked on different networks, and DNS interference was inconsistent even within a single ISP''s resolvers, confirming that censorship was decentralized rather than implemented via a national choke point.'
