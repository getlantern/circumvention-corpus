defense_implications:
    - Ground covert-channel entropy targets in empirical measurements of the chosen cover traffic (e.g., real query corpora), not theoretical maximums, so statistical tests on per-request entropy cannot flag the channel.
    - Use site-specific OpenSearch or equivalent real-service query formats as cover rather than synthetic HTTP requests; the diversity of legitimate traffic provides natural statistical cover.
