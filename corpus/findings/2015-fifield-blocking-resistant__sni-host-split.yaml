paper: 2015-fifield-blocking-resistant
kind: detection
summary: |
  The paper formally characterizes the censor's visibility gap: the SNI field
  in the TLS ClientHello and the HTTP Host header inside the tunnel are the two
  places that reveal destination, and CDNs that terminate TLS before forwarding
  HTTP requests prevent censors from correlating them. Any censor capable of
  correlating SNI to inner-Host (e.g., through CDN cooperation or plaintext
  HTTP/2 framing) can defeat domain fronting without CDN blocking.
techniques: [sni-blocking, dpi]
defenses: [domain-fronting]
censors: [generic, cn, ir, ru]
defense_implications:
  - "Domain fronting's security model depends entirely on the CDN not cooperating
    with the censor; treat it as probabilistic/economic protection, not cryptographic."
  - "For higher-assurance destinations, layer an encrypted transport (e.g., Tor,
    obfs4) inside the fronted HTTPS tunnel so that CDN cooperation still does not
    reveal the real destination."
section: "§3"
extracted_by: claude-sonnet-4-6
