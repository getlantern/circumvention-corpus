defense_implications:
    - 'Circumvention tool designers should not extrapolate usage behavior from democracies: in high-censorship environments, users exhibit qualitatively different content-seeking patterns, requiring tools optimized for broad exploratory access rather than targeted unblocking.'
    - The absence of the gateway effect in Iran and Russia (where censorship exists but Wikipedia was not fully blocked at the time) suggests that breadth and duration of censorship amplifies spillover demand — tools operating in CN face the most severe pent-up demand during crises.
