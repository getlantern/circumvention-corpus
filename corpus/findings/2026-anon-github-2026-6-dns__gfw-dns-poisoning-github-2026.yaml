paper: 2026-anon-github-2026-6-dns
kind: detection
summary: The GFW blocks GitHub via DNS poisoning across at least four domains — github.com, assets-cdn.github.com, github.global.ssl.fastly.net, and raw.githubusercontent.com — causing connection timeouts and page-load failures for mainland China users. The block is persistent as of February 2026, affecting both browser access and command-line git operations.
techniques:
    - dns-poisoning
    - ip-blocking
censors:
