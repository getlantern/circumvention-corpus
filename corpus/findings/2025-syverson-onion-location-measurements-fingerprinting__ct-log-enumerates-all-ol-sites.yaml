defense_implications:
    - The complete set of O-L onion associations is publicly enumerable via CT logs at modest cost; any circumvention design relying on onion address obscurity must not advertise the association via O-L response headers or SANs in CT-logged certificates.
    - Circumvention services that want to preserve onion address confidentiality should deliver associations through out-of-band or encrypted channels not indexed by CT, such as a separately authenticated onion-service-hosted API.
