defense_implications:
    - Circumvention infrastructure for CN users must achieve IP/ASN diversity at a scale that survives administrative enforcement waves, not just protocol-level evasion of any single DPI signature.
    - Treat upstream resource pools as ephemeral with unpredictable TTLs; automate discovery, onboarding, and rotation of IP/ASN resources rather than assuming stability.
