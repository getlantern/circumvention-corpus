defense_implications:
    - Seed relay lists with a small number of high-value 'untouchable' IP addresses (CDN anycast nodes, OS update servers, DNS resolvers) to inject a verification burden that breaks automated batch-blocking pipelines.
    - Even a brief window (30 minutes) where the censor blindly trusts your list gives you the ability to test censor behavior — use steganographic encoding in which decoy IPs are served to enumerate spy source addresses.
