defense_implications:
    - Run the full target cover protocol stack (complete TLS negotiation, real VoIP codec frames, authentic TCP handshake) rather than shaping or morphing; partial imitation leaves fingerprints that improve as censors invest in deeper classifiers.
    - Avoid out-of-band upstream channels (IP spoofing, steganographic email) that create asymmetric traffic patterns exploitable via active probing — a censor can manipulate the supposed VoIP call and detect whether the server responds in a way inconsistent with a real call.
