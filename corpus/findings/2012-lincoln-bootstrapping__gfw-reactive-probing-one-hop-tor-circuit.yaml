defense_implications:
    - Proxies must implement access-control authentication before revealing their identity — any service that completes a standard Tor (or proxy) handshake in response to an unauthenticated probe is fully exposed.
    - Design gateways to return innocuous cover responses to connections that lack the correct credential sequence, so active probers see only a normal web server.
