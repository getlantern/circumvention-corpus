defense_implications:
    - Bridge operators should stop the Tor service entirely and wait the full 12-hour cooldown before resuming — partial operation during the block resets the timer.
    - Hosting Tor bridges on cloud IPs shared with legitimate web services creates collateral damage; IP-level blocking will silently take down co-located services.
