defense_implications:
    - Cap the total credits a user can earn from any single bridge (parameter T1) to bound the damage from conservative blockers who hold bridges alive to farm invitation rights before executing a mass block.
    - Monitor the blocked-to-recruited bridge ratio as a real-time signal of adversarial penetration; dynamically raise invitation-credit thresholds if the ratio degrades past the ~30% tolerance band.
