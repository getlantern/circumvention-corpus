summary: 'ACM SIGCOMM 2015''s program committee accepted the Encore paper with an unprecedented ''signing statement'' after heated ethical debate. The committee''s core objections were: (1) users accessing censored URLs might face repercussions in regimes without due process; (2) most users under censorship would be unlikely to consent to the measurements; and (3) unlike ad-tracker third-party requests, Encore requests do not reflect any user intent.'
