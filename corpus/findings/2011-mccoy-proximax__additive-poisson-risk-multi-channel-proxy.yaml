    - 'Avoid broadcasting the same proxy address across redundant channels: additive risk means each extra channel reduces expected lifetime, so use the minimum number of channels needed to saturate proxy capacity.'
    - Maintain separate proxy pools per trust tier so that a high-risk channel exhausting its pool does not drain infrastructure shared with lower-risk channels.
