id: 2025-tusing-minecraft-tunnels
title: "Minecraft tunnels for covert communications"
authors:
  - Nathan Tusing
  - Jonathan Oakley
  - Chunpeng Shao
  - Lu Yu
  - Richard Brooks
venue: Entertainment Computing
year: 2025
doi: "10.1016/j.entcom.2025.100872"
url: "https://www.sciencedirect.com/science/article/pii/S1875952125000047"
abstract: |
  MinecruftPT is a censorship-circumvention tunnel that encodes traffic
  steganographically inside the Minecraft (Java Edition) network protocol.
  A MinecruftPT session looks to a network observer like an online
  Minecraft game between client and server. Reference implementation at
  github.com/doudoulong/Minecruft-PT.
censors: [generic]
techniques: [dpi, traffic-shape, tls-fingerprint]
defenses_discussed: [steganography, mimicry, tunneling, pluggable-transport]
evaluation_methods: [controlled-deployment, simulation]
core: false
visibility: public
date_added: "2026-05-05"
added_by: afisk
sources:
  - "url:https://github.com/net4people/bbs/issues/463"
notes: |
  Cover-channel circumvention via gaming traffic. Compares well against
  WebRTC-based transports (Snowflake) — Minecraft's TCP-based protocol
  is more available in environments where WebRTC is filtered, and the
  underlying traffic is high-volume + varied enough to make mimicry
  classification harder for the censor. Niche venue (Elsevier
  Entertainment Computing) means it doesn't surface in security-conf
  searches; reached us via net4people reading group.
