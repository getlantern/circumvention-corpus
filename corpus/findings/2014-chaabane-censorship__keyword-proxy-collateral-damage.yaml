defense_implications:
    - Never embed the string 'proxy' (or any circumvention tool brand name) in a URL path, query parameter, or hostname — Syrian-style string-match censors will block all matching traffic indiscriminately, including legitimate update and CDN calls.
    - Design obfuscated endpoint paths that are lexically neutral; audit all third-party SDKs and CDN integrations for URL patterns that could trigger keyword-based collateral blocking.
