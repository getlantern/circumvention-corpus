defense_implications:
    - Use real IM platform APIs as the actual transport layer rather than mimicking IM traffic — authentic protocol behavior defeats both DPI and traffic-shape classifiers more reliably than mimicry, which is fragile against feature-complete protocol fingerprinting.
    - Prioritize cover channels with sub-1s native message latency (IM) and file-attachment support over VoIP or email tunnels, which impose multi-second or multi-minute delays that degrade QoS below usability thresholds.
