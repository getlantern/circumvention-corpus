defense_implications:
    - BGP-intact shutdowns mean IP-reachability probes are unreliable indicators of censorship—circumvention tools should use application-layer liveness checks, not just TCP reachability, to detect blockage.
    - Whitelist-based IP blocking requires circumvention infrastructure to either use whitelisted IP space (CDN fronting, domestic NIN relay) or accept that connection attempts to foreign IPs will be silently dropped.
