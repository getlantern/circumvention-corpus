paper: 2013-winter-scramblesuit
kind: defense
summary: 'ScrambleSuit defeats active probing by requiring clients to prove knowledge of an out-of-band shared secret before the server responds; a probing censor receives only silence. Two mechanisms are provided: session tickets (preferred for non-Tor applications) and an authenticated UniformDH handshake (optimized for Tor''s shared-secret bridge distribution model), with both producing payloads computationally indistinguishable from random.'
