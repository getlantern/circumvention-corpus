defense_implications:
    - Content that requires per-copy human review (many independent copies with distinct identifiers rather than a linear repost chain) forces censors to work at a scale that makes suppression economically unsustainable.
    - Circumvention systems should avoid linear repost chains in favor of parallel independent propagation to prevent single-point cascade deletion.
