id: 2025-niere-encrypted
title: "Encrypted Client Hello (ECH) in Censorship Circumvention"
authors:
  - Niklas Niere
  - Felix Lange
  - Nico Heitmann
  - Juraj Somorovsky
venue: "FOCI 2025 (Free and Open Communications on the Internet)"
year: 2025
url: "https://petsymposium.org/foci/2025/foci-2025-0016.pdf"
abstract: |
  Censors have long blocked TLS traffic by inspecting the
  unencrypted Server Name Indication (SNI) extension. By
  encrypting the SNI, the Encrypted ClientHello (ECH) prevents
  censors from blocking TLS traffic to specific domains. Despite
  this promising outlook, ECH's current capability to contest
  TLS censorship is unclear; for instance, Russia has started
  censoring ECH connections successfully. The authors evaluate
  servers' support for ECH and its analysis and subsequent
  blocking by censors. They determine Cloudflare as the only
  major provider supporting ECH, affirm previously known ECH
  censorship in Russia, and uncover indirect censorship of ECH
  through encrypted-DNS censorship in China and Iran. The
  findings suggest ECH's contribution to circumvention is
  currently limited — its dependence on encrypted DNS is
  especially challenging.
