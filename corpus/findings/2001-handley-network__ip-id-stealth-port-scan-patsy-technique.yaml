paper: 2001-handley-network
kind: detection
summary: 'An attacker can conduct stealth port scans against a victim without revealing their own IP by exploiting a ''patsy'' host whose OS uses a globally incrementing IP Identifier: the attacker observes ID increments of 2 (rather than 1) in the patsy''s traffic when the victim sends a RST to the patsy in response to a spoofed SYN, revealing open ports. Choosing a different patsy for each port makes the scan very hard to detect.'
