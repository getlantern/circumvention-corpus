defense_implications:
    - Circumvention tools targeting India should not assume that domains reported as unblocked in official orders are actually accessible — stale blocklists mean operator-reported unblocking is an unreliable signal for infrastructure decisions.
    - Long-lived domain assets used for censorship circumvention may accumulate blocklist entries across Indian ISPs that persist indefinitely, favoring domain rotation strategies over stable long-term domains.
