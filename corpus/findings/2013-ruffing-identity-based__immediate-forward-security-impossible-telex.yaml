defense_implications:
    - Accept that decoy-routing systems (Telex, TapDance, Conjure) are structurally limited to eventual rather than immediate forward security; design key-rotation schedules and key-erasure policies accordingly.
    - Size key material for decoy-routing systems to fit in narrow covert channels (target a few hundred bytes for the master public key) so that key rotation can happen via steganographic side channels even when direct distribution is blocked.
