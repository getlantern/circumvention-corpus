defense_implications:
    - Friends-only sharing is the only robust defense against targeted fake-post confirmation attacks — content alteration alone is insufficient when a human inspects the match.
    - Preserve post attribution integrity via user-held signing keys so that injected fake posts authored by the censor's fabricated accounts are detectable by recipients who verify the cryptographic signature.
