defense_implications:
    - Avoid co-locating circumvention tool infrastructure (Outline, Lantern, etc.) on shared CDN IPs that host high-value targets like Snapchat; collateral blocking of those IPs is highly probable when the censor uses coarse IP lists.
    - Distribute proxy endpoints across many IP prefixes and ASes so that blocking any single IP does not take down the entire fleet.
