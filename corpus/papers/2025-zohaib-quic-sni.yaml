id: 2025-zohaib-quic-sni
title: "Exposing and Circumventing SNI-based QUIC Censorship of the Great Firewall of China"
authors:
  - Ali Zohaib
  - Qiang Zao
  - Jackson Sippe
  - Abdulrahman Alaraj
  - Amir Houmansadr
  - Zakir Durumeric
