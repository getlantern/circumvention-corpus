defense_implications:
    - DR infrastructure can be globally viable with cooperation from as few as 30 ASes — a qualitatively different negotiation problem than the hundreds previously believed necessary.
    - When replacing ASes in censorious nations (Russia, China) with the next-best alternatives (ASes ranked 31–50 by path frequency), coverage remains above 90%, so DR placement can avoid politically hostile operators without sacrificing effectiveness.
