defense_implications:
    - Never use passive IP geolocation databases (Maxmind, etc.) to assess whether circumvention tool traffic will cross national borders; these databases systematically mis-attribute anycast front-end IPs to the AS headquarters country rather than the actual serving location, producing errors exceeding 75 percentage points.
    - Infrastructure assessments for decoy routing overt-site availability must use active RTT-based geolocation (or equivalent multilateration) to correctly classify anycast vs. DNS-based CDN hosting before drawing conclusions about cross-border reachability.
