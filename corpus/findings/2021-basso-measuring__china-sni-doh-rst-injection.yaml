defense_implications:
    - 'For DoH over CDN IPs in China, SNI selection is load-bearing: using a CDN''s public DoH hostname triggers blocks even when the underlying IP is otherwise permissible — tools must either use ECH or select an SNI not on the GFW''s blocklist.'
    - SNI blocklist coverage in China is domain-specific rather than IP-based for CDN-hosted DoH; this creates a moving target requiring ongoing monitoring to identify which CDN subdomains are blocked.
