defense_implications:
    - Replace email- and social-media-based bridge distribution with a formally secure steganographic rendezvous to eliminate the heuristic-only security assumption that has historically enabled targeted bridge enumeration.
    - Adopt the NIKE + HKDF construction from MoneyMorph (Diffie-Hellman shared key, then HKDF-derived per-session keys) so that even passive observation of the complete blockchain ledger yields no advantage to the censor in identifying bootstrapping transactions.
