summary: 'The GFW performs no stateful TCP stream reassembly, inspecting one packet at a time: splitting the blocked keyword ''?falun'' across two TCP segments is sufficient to evade detection entirely. Cross-device state is also absent — triggering a block on one border AS (e.g., AS9929) had no effect on traffic transiting a different Chinese border AS.'
