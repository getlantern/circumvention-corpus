defense_implications:
    - True BGP-containment of a large warden is economically and politically infeasible; decoy routing should be viewed as a cost-raising measure rather than a definitive solution, and must be paired with other circumvention layers (end-to-end pluggable transports, domain fronting) that do not depend on AS-level topology guarantees.
    - Infrastructure deployment plans should not invest in refraction-networking infrastructure as the sole circumvention layer for high-capability wardens like China; complementary end-to-end obfuscation remains essential.
