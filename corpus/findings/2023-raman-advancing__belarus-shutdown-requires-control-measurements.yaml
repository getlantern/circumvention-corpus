defense_implications:
    - Circumvention clients that embed reachability probing should always include a control probe to a neutral, unblocked endpoint alongside domain-specific probes; a simultaneous failure of both signals a shutdown or network outage rather than targeted blocking, and the client should fall back differently in each case.
    - Automated blocking-event detection in circumvention infrastructure should check correlated failure rates across multiple unrelated destinations before triggering censor-evasion responses, to avoid false alarms during ISP outages.
