defense_implications:
    - Short agent sessions reduce the available fingerprinting signal — circumvention agents should prefer tasks decomposed into many short browsing episodes over single long sessions on potentially adversarial pages.
    - Early mid-session identification means a site can condition a targeted prompt injection or content poisoning attack before the agent's task completes, making adversary-controlled pages a real-time threat rather than a post-hoc attribution concern.
