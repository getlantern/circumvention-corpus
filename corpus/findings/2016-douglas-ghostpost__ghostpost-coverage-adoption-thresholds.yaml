defense_implications:
    - Distributed user-as-sensor designs can achieve adequate censored-content coverage at sub-2% adoption thresholds — prioritize user acquisition up to the ~0.5% inflection point rather than optimizing the monitoring frequency.
    - Model coverage as a race between censor throughput (queue-based) and distributed observer density — at parity, even small increases in observer count disproportionately help.
