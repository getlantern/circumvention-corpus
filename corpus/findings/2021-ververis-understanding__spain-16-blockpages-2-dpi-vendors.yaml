defense_implications:
    - Blockpage fingerprinting (simhash on HTML body) is an effective enumeration method for censored domains — circumvention tools should test domains discovered via this technique, not just explicit blocklists.
    - When multiple DPI vendors are confirmed across major ISPs in a country, tools should test evasion against each vendor's known inspection characteristics rather than assuming a homogeneous middlebox environment.
