defense_implications:
    - Deploy downstream-only decoy routing to reduce volunteer AS recruitment burden by 53× for equivalent routing-attack resistance — making practical deployment achievable with a single well-placed AS.
    - Prioritize recruiting ISPs whose downstream routes cover a broad share of censored-country users rather than ASes appearing on many upstream paths.
