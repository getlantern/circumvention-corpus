defense_implications:
    - Operating multiple simultaneous proxy nodes and delaying promotion of their URLs until just before use (e.g., one hour before a live event) reduces censor dwell time for discovery and blocking; at least one of two nodes survived the full event window.
    - Non-branded hosting and URL shorteners provide a layer of obfuscation that slows IP/domain-based blocking; circumvention infrastructure should be hosted under domains with no association to the content provider.
