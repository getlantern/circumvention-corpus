defense_implications:
    - Filtering infrastructure transitions (new vendors, new ASes going online) create temporary detection blind spots; circumvention tools should continuously re-probe blocking behavior rather than caching country-level block profiles.
    - Multiple concurrent block-page templates within a single ASN indicate load-balanced or geographically distributed filtering infrastructure — a successful connection to one probe target does not guarantee a different target is unblocked.
