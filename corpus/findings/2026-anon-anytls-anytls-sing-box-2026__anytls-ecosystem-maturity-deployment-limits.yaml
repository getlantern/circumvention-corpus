defense_implications:
    - The absence of a URI scheme / subscription format creates a deployment friction barrier — circumvention tools integrating AnyTLS should implement their own provisioning mechanism (e.g., inline JSON in config-new API responses) rather than waiting for ecosystem standardization.
    - Given AnyTLS's limited multi-client support, tools targeting non-technical users should treat it as an advanced/experimental track rather than a default, and maintain parallel VLESS or Hysteria2 tracks as the primary stable fallback.
