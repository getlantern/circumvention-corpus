    - decoy-routing
censors:
    - generic
defense_implications:
    - Implement a central coordinator that tracks per-decoy-site concurrent user counts across all stations and signals stations to redirect new clients when a site nears its connection limit.
    - Apply exponential back-off when a client fails to connect to its chosen decoy site to prevent thundering-herd load spikes from cascading across backup sites.
