defense_implications:
    - A 6th-order character Markov model is sufficient for near-lossless decoding of this scheme; implementors should not rely on the decoder being error-free and should layer a short error-correction or checksum over the hidden payload.
    - Partial corruption (15% character error rate on failures) means error-tolerant payload formats—hex-encoded keys, base32 addresses—are more robust than plain prose in the hidden message.
