paper: 2023-wang-self-censorship
kind: policy
summary: 'Hong Kong Twitter discussion of COVID-19 continued declining after mid-2020 and did not resurge during Hong Kong''s large March 2022 COVID wave, unlike the control group whose COVID discussion tracked local transmission rates. The authors interpret this anomalous pattern as a generalized chilling effect: NSL legal risk suppressed even politically ambiguous health discussion that mainland China had censored but that may not clearly fall under the NSL.'
techniques:
