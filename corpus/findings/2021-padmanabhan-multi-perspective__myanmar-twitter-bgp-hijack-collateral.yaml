defense_implications:
    - Circumvention infrastructure operators should monitor for BGP hijacks of their IP space using RouteViews/RIPE RIS feeds; an ISP attempting to locally blackhole proxy IPs can accidentally leak the block globally.
    - Prefer anycast or CDN-backed addressing for proxy endpoints so that a rogue BGP announcement of a single prefix does not take down all access to the service.
