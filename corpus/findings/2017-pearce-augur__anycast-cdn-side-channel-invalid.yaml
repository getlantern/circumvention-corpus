defense_implications:
    - Circumvention tools relying on CDN fronting (Cloudflare, Fastly) cannot be tested for outbound blocking via IP ID side-channel methods — use direct probing or OONI-style in-country tests for CDN-fronted endpoints instead.
    - Proxy IPs that apply per-origin ingress filtering will appear blocked in side-channel measurements even when reachable; operators must verify that reflector-to-proxy paths are free of asymmetric ingress filtering before interpreting Augur-style signals as censor action.
