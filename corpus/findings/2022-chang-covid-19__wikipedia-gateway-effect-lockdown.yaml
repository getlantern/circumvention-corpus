defense_implications:
    - Circumvention tools that provide access to reference/encyclopedia content (not just social media) are high-value; Wikipedia-equivalent content is among the first things newly circumventing users seek.
    - HTTPS-based blocking of entire domains (GFW blocked all Chinese Wikipedia after its HTTPS migration) pushes users toward VPNs rather than targeted page-level tools — full-tunnel solutions reach wider audiences in such environments.
