defense_implications:
    - Circumvention tools targeting China must assume IP/domain blocklists rotate at hours-to-days timescale; hardcoded or infrequently-refreshed server lists will become stale rapidly.
    - Infrastructure selection for circumvention proxies should factor in a censor's list-update cadence — Chinese-market proxies require faster IP rotation than those serving countries with static blocklists.
