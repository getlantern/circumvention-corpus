    - ir
    - sy
defense_implications:
    - Decoy routing schemes that publish a public directory (as Telex does) hand the warden the enumeration directly; any viable design must keep decoy-router locations secret and prevent intersection attacks by ensuring probe paths cannot be disambiguated.
    - Because shadowing by one tainted AS masks others behind it, deployment strategies that maximize 'shadow depth' (putting decoy routers near the warden's upstream transit) may reduce the warden's enumeration accuracy for interior ASes.
