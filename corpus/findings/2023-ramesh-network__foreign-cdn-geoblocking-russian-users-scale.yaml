defense_implications:
    - When a domain implements geoblocking at both DNS and TCP layers, switching to an alternative resolver does not restore access; tools must relay or tunnel at the transport layer as well.
    - CDN-delivered geoblocking (Cloudflare, Akamai) affects large swaths of content simultaneously; circumvention tools should route through non-CDN or CDN-exempt paths and not assume CDN-hosted fronting targets remain stable during geopolitical crises.
