defense_implications:
    - Calibrate CRS traffic proportions using estimates of the censor's collateral-damage sensitivity (βant) relative to censorship sensitivity (αact) to stay below threshold F and avoid triggering channel shutdown.
    - In long-running deployments set CTP = (1−p)·CTPmax rather than maximizing throughput greedily; the continuation-probability discount is the correct parameter for sustaining the equilibrium across indefinite play.
