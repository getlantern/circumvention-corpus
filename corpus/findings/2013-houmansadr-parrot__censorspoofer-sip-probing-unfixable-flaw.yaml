defense_implications:
    - Any design that decouples the traffic-generating endpoint from the address appearing in protocol headers (IP spoofing, asymmetric routing) makes correct active-probe response architecturally impossible and should be avoided.
    - 'Mimicking IETF SIP specifically is counterproductive: the protocol is so rarely deployed (0 of 10,000 random IPs in experiments) that any address running it is anomalous, and proprietary VoIP (Skype, Google Voice) is detectable via its own probing surface.'
