defense_implications:
    - DNS encryption (DoH/DoT) alone is insufficient against censors that additionally deploy SNI-based filtering; circumvention tools must address both layers simultaneously or the net gain is near zero for heavily censored regions like Iran.
    - Targeting only the DNS layer while ignoring TLS-layer SNI exposure will leave the majority of high-value blocked domains unreachable in Iran and approximately 44% unreachable in China.
