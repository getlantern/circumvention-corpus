defense_implications:
    - Any circumvention proxy reachable on a fixed public IPv4 address and port should be assumed discoverable within minutes by a well-resourced adversary; designs must account for rapid IP enumeration and incorporate rotating or ephemeral addressing.
    - Proxy operators should treat IP obscurity as having a half-life of hours, not days — active probing after ZMap discovery means a newly deployed server may be fingerprinted and blocked before reaching significant user adoption.
