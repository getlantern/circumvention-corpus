date_added: 2026-05-04
added_by: afisk
sources: ["url:https://gfw.report/publications/sp25/en/", "github:gfw-report/sp25-regional"]

notes: |
  Important mental-model update: CN censorship is not monolithic. Lantern
  measurement methodology that bins all CN traffic together loses signal;
  the bandit's per-ASN dimensioning already partially addresses this but
  province-level effects suggest we need finer geo dimensioning for CN
  in particular. If we see anomalous CN bandit signals concentrated in
  one province, this paper is the first place to look.
