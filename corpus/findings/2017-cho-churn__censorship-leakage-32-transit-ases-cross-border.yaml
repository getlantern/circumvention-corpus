defense_implications:
    - Audit the AS-level path to any circumvention server for known transit-filtering ASes (e.g., AS1299, AS4812, AS4637) — clients neither in China nor targeting Chinese servers can still encounter GFW-style censorship when routing through Chinese transit ASes.
    - Prefer bridge infrastructure hosted on stub ASes rather than major international transit providers to minimize exposure to inadvertent censorship leakage from unrelated jurisdictions.
