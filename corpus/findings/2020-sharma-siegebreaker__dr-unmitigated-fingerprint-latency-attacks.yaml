defense_implications:
    - Any DR design that does not pad or reshape proxied traffic remains vulnerable to website fingerprinting; integrating padding oracles or HTTPOS-style traffic shaping at the secret proxy layer is needed before deployment in high-adversary environments.
    - Out-of-band control channels (email, SMS, IM) introduce a timing dependency that a network-level adversary can exploit by selectively delaying control messages; DR designs should architect for control-channel unavailability by caching pre-registered sessions or supporting a fallback in-band registration path.
