defense_implications:
    - Avoid hosting circumvention infrastructure on TLDs or ASNs that are politically adversarial to the target country — blanket TLD blocks require no per-URL analysis and can be deployed instantly.
    - When diagnosing an unexpected block of a proxy server, check non-content signals (TLD, hosting ASN, co-hosted neighbors) before assuming protocol-level DPI detection was the cause.
