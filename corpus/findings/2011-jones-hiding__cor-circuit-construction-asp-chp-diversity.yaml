defense_implications:
    - Implement circuit-selection logic that enforces ASP and CHP diversity constraints end-to-end, not just at entry/exit; a sandwiched intermediate node from the same ASP adds zero anonymity and should be detected and rejected during path building.
    - Route circuits through multi-homed datacenters so ingress and egress ISPs differ, forcing a perimeter adversary to monitor multiple ISP uplinks rather than a single chokepoint.
