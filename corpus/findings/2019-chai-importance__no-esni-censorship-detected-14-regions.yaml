defense_implications:
    - The absence of ESNI blocking in 2019 (including in China and Iran) provided a narrow deployment window; circumvention infrastructure should be staged to maximize ESNI adoption before censors determine the false-positive cost of blocking it is acceptable.
    - The shortened GFW residual censorship window (60 s vs. 90 s) must be accounted for in connection retry and port-rotation logic to avoid triggering residual blocks during reconnection attempts.
