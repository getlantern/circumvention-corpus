defense_implications:
    - Sub-50% latency overhead is within the acceptable range for most interactive applications; alibi-based relay selection is a viable production strategy for users who need provable geographic avoidance.
    - Negative inflation cases (overlay shorter than BGP default) suggest relay nodes with favorable physical placement can improve performance — worth measuring whether alibi relays beat the censored-path baseline in target geographies.
