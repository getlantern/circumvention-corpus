defense_implications:
    - For decoy routing deployments targeting less-connected censors (Venezuela, Syria, Iran), even a small decoy network is highly effective; concentrate resources on placements covering those countries' limited alternative routes.
    - Analyze each target censor's ring-AS count and controlled-AS count before deployment to calibrate the minimum viable decoy coverage needed to impose prohibitive costs.
