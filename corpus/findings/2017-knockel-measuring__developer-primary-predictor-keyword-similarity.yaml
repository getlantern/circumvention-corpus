defense_implications:
    - Studios acquired by larger publishers retain their distinct keyword filtering logic; evasion strategies valid for one studio's games may fail on games from another studio under the same publisher umbrella
    - Mergers or publisher changes in the Chinese gaming industry do not reliably homogenize keyword filtering — tool designers should not assume corporate consolidation reduces filtering complexity
