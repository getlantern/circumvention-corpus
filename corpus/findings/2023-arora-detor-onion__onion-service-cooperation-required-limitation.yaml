defense_implications:
    - Any provable-avoidance scheme that depends on voluntary counterparty cooperation must be paired with a trust-signaling mechanism (e.g., onion service advertises DeTorOS support in its descriptor) so clients can self-select to services that will participate.
    - For threat models where the onion service itself may be adversarial or coerced, TEE-based remote attestation on the service side is the only known path to closing the cooperative honesty assumption — treat non-TEE deployments as best-effort rather than provable.
