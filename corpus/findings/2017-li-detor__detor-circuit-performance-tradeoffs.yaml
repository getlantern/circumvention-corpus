defense_implications:
    - RTT-based geographic avoidance is incompatible with delay-injection anonymity defenses (WTFPAD, etc.) — deploying both simultaneously degrades avoidance proof coverage; choose one primary defense model.
    - The latency advantage of DeTor circuits (shorter paths selected) is a secondary benefit but also a potential fingerprint — clients should be aware that DeTor circuits are statistically faster than normal Tor circuits.
