notes: |
  Significant escalation of Russia's VPN surveillance — moves detection
  from network layer (TSPU) to client-application layer. Threat-model
  implication for Lantern: even if a Russian client successfully reaches
  a circumvention proxy, in-app surveillance can flag the VPN
  connection at the app layer and block users that way. Behavioral
  biometrics enable cross-account re-identification, defeating the
  "anonymous account behind a proxy" usage pattern. Pairs with TSPU
  measurement work (2024-xue-tspu-russia) as the application-layer
  half of the Russian censorship picture.
