defense_implications:
    - 'When designing proxy-distribution or software-update channels, adopt a sender-bears-risk model: require no account signup or authentication from the censored user, so even if the sender''s account is banned or the content flagged, user traceability is minimized.'
    - Distinguish between rendezvous (small, on-demand, bidirectional) and update (large, push, unidirectional) channels architecturally — serving both from the same channel design forces undesirable tradeoffs on bandwidth and anonymity.
