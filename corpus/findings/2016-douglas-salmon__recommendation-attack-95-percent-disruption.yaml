    - ir
defense_implications:
    - 'Assign users in the same recommendation ancestry tree to the same server group: because friends naturally share credentials anyway, this design choice is both socially natural and security-preserving, confining infiltrated subtrees to their own server pool.'
    - 'Treat recommendation-amplified agent growth as a first-class threat: the 4-month incubation delay before an agent can recommend is a key defense, and server IP rotation on detection of mass blocking events provides recovery when that delay is eventually overcome.'
