defense_implications:
    - Protocols relying on well-known DoT/DoH IPs (e.g., 8.8.4.4, Cloudflare ranges) as a transport must rotate or avoid those specific IPs in Iran — the block is IP-keyed, not protocol-keyed, so SNI camouflage provides no benefit.
    - Endpoint-based blocking means fresh IPs or domain-fronted DoH (where the blocking signal is the IP, not the SNI) are the appropriate evasion strategy in this context.
