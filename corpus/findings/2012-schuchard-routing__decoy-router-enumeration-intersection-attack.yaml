paper: 2012-schuchard-routing
kind: detection
summary: 'A routing-capable warden can enumerate over 90% of decoy-router-deploying ASes for deployments as large as 4,000 ASes using an intersection-based discovery attack: the warden probes many paths, accumulates a set of ''clean'' ASes, and prunes candidate paths until a single ''tainted'' AS remains. All evaluated wardens (China, Syria, Iran, Australia, France, Venezuela) achieved roughly equal detection success across all deployment sizes.'
techniques:
    - active-probing
    - bgp-hijack
defenses:
