summary: 'An ''evasion'' attack exploits the mirror condition: the IDS drops a TCP segment that the end-system accepts, due to differences in overlap-resolution policy. The IDS reconstructs ''ATTCK'' while the end-system sees ''ATTACK''; the missing segment carries the content that would trigger the signature, leaving the censor with an incomplete—and non-matching—view of the stream.'
