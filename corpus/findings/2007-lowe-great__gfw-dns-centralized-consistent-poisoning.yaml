defense_implications:
    - The cross-carrier uniformity of the 8-IP pool confirms centralized GFW policy enforcement; a static compile-time denylist of those IPs is sufficient to detect poisoning without per-ISP calibration.
    - The consistency means there is no 'safe' Chinese recursive resolver to fall back on — all in-country DNS is compromised, and any resilient circumvention bootstrap must use out-of-country or encrypted DNS resolution.
