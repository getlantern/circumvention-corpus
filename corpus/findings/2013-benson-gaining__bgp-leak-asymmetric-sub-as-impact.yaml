    - measurement-platform
censors:
    - generic
defense_implications:
    - Proxy infrastructure should be distributed across multiple /16 prefixes within a provider AS — a BGP-level disruption may spare certain prefixes, and clients that can enumerate prefix-level reachability can failover within the same provider without switching providers entirely.
    - Monitoring per-prefix TTL stability alongside aggregate AS metrics provides finer-grained fault isolation; circumvention relay operators can use this to distinguish globally affected ASes from partially affected ones and maintain partial service.
