defense_implications:
    - Do not build decoy-routing or in-network proxy schemes on the assumption that both flow directions pass the same middlebox; design for one-way observation from the start.
    - Tier-1 transit paths are especially asymmetric — place decoy routers at ISP peering points rather than backbone cores to maximise bidirectional coverage.
