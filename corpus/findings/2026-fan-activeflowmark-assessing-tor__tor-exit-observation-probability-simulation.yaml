summary: 'Using tornettools-based simulations with historical Tor consensus data scaled to 1% of the real network (80 relays), the adversary''s exit-observation probability p̂exit grows monotonically with adversary-controlled bandwidth: a single exit relay at 148 Mbps yields p̂exit ≈ 2.13%, and 5 adversary-controlled exit relays push p̂exit above 10%.'
