defense_implications:
    - The near-universal reachability of the private filtering infrastructure across disparate ASNs confirms Iran's censor operates a highly available, centrally administered system — circumvention tools should not design around exploiting censor infrastructure outages as a bypass strategy.
    - Proxy-based reachability testing from inside Iran is a viable low-cost measurement methodology for mapping national intranet coverage without requiring dedicated vantage points.
