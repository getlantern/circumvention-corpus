paper: 2017-lu-accessing
kind: deployment
summary: 'ScholarCloud was launched in January 2016 and by late 2017 served over 2,000 registered users with 700 daily active users. It operates on two commodity VM instances at a daily operational cost of 2.20 USD. Legal operation inside China was achieved by registering the service as an ICP with the TCA (China ICP Reg. #15063437) and restricting the proxy whitelist to verifiably legal but incidentally-blocked domains — a strategy that places the service outside the GFW''s aggressive technical blocking while also satisfying regulatory scrutiny from MPS/MSS.'
defenses:
