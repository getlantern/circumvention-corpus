defense_implications:
    - With 99.37% of Chinese clients blocked from Tor directory servers, any Tor-based circumvention tool targeting China must rely entirely on unlisted bridges rather than public directory infrastructure.
    - The 0.63% unblocked rate confirms the GFW is not perfectly consistent; tools can exploit transient filter gaps or route diversity to establish initial connections.
