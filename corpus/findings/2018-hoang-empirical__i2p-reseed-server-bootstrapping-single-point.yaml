defense_implications:
    - Hardcoded bootstrap servers are a high-leverage blocking target; distribute reseeding over domain-fronted, steganographic, or out-of-band channels (email, social media, mirrors) so the bootstrapping step survives IP-level blocking of the primary reseed infrastructure.
    - Treat the bootstrapping channel as a separate threat surface from the relay channel and design it with independent censorship resistance, since blocking a handful of reseed server IPs costs the censor almost nothing yet denies all new users.
