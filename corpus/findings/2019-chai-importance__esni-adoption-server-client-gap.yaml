defense_implications:
    - ESNI's anti-censorship value scales with client adoption, not server support; circumvention tools should push for ESNI to be enabled by default in mainstream browsers and TLS libraries so that circumvention traffic is indistinguishable from ordinary ESNI traffic.
    - Publicly promoting ESNI as a circumvention tool before broad client adoption risks triggering early censor blocking while the false-positive cost to censors is still low — deployment strategy should prioritize quiet, organic adoption first.
