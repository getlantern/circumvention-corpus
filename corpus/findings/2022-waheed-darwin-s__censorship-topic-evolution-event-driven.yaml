summary: 'D-LDA detected event-driven shifts in Indian censorship without prior knowledge: the word ''violence'' disappeared from the ''Riots in India'' topic cluster between months 6 and 14 of the measurement period, and ''killing'' did not appear until month 16, consistent with the absence of actual riots during that window. Similarly, the ''Danish cartoonist'' topic shifted from cartoon-focused discourse to broader Islamic-rights framing (''freedom,'' ''speech'') approximately 18 months in.'
