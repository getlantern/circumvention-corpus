defense_implications:
    - Confine domain fronting to control/signaling traffic only; route bulk data through volunteer or client-to-client proxies to keep per-user costs below $0.001/month.
    - Architect the operator as a low-bandwidth coordinator rather than a data-plane relay so that expensive shared-IP infrastructure carries only session metadata.
