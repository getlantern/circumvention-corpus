defense_implications:
    - Economic pricing as a blocking mechanism (~$1–3/GB for VPN-grade access) is a novel censor tactic that technical circumvention tools alone cannot defeat; subsidized or zero-rated access infrastructure is required to serve general-population users in this model.
    - The whitelist architecture means circumvention tools relying on foreign IP endpoints face structural rather than evasion-based blocking—CDN-fronted or domestically-accessible relay architectures (NIN-reachable entry points) become the primary viable path.
section: 'The Architecture of Tiered Access: "Internet Pro"'
