summary: 'Padding-only defenses that inject bursty traffic cause severe additional delay under realistic network bottlenecks: Break-Pad''s delay overhead increases from 0% to 332.6% and FRONT''s from 0% to 111.2% under a per-trace simulated PPS bottleneck. Even ephemeral padding defenses induce 43.9% delay overhead under bottleneck conditions, compared to 0% without a bottleneck, due to congestion from dummy packets.'
