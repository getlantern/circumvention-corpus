defense_implications:
    - A curated list of ~136 fully-immune open DNS resolvers in Shanghai could serve as a reliable bootstrapping mechanism for circumvention tools needing to resolve proxy server hostnames without filtering interference.
    - Open resolver lists are highly dynamic (significant churn in the first week); any such list must be refreshed continuously to remain usable.
