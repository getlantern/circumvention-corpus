defense_implications:
    - Deploy latency-independent throughput monitoring (M-Lab NDT or equivalent) as a persistent canary; a sustained >50% throughput drop without a corresponding RTT increase is a signature of administrative throttling, not infrastructure failure.
    - Design circumvention tools with adaptive bitrate and offline-first caching so multi-month throttling events (as observed Nov 2011 – Aug 2012) do not render the tool completely unusable.
