defense_implications:
    - Do not rely on TCP options (MPTCP, Window Scale, MD5) being preserved end-to-end; ~10% of paths strip them at the access edge, making option-dependent handshake or signaling mechanisms unreliable for circumvention transports.
    - Test for first-hop TCP option stripping before deploying transports that use non-standard TCP options as covert signaling channels.
