defense_implications:
    - Rotating server IP addresses or using IP addresses not yet in the GFW's null-route list exploits the asymmetry between the common stateless filter (easy to update) and the rarer null-route enforcement (applied to only a subset of IPs).
    - The server-to-client direction of most blocking means that techniques hiding the server's true source IP—such as domain fronting or decoy routing—can defeat the most prevalent GFW Tor-blocking mechanism.
