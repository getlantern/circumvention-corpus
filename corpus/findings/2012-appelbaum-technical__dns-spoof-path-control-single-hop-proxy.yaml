paper: 2012-appelbaum-technical
kind: detection
summary: An attacker with DNS spoofing capability — the paper cites the GFW explicitly — can respond to Ultrasurf DNS discovery queries before legitimate resolvers and inject crafted CNAME records that fully control the client's single-hop path selection. In code paths where peer verification is skipped ('SkipverifyQ0' log entries), this enables complete traffic interception without any cryptographic break.
techniques:
    - dns-poisoning
censors:
    - cn
defense_implications:
    - Authenticate all server descriptors with a pinned public key before acting on them; DNS responses must be treated as untrusted transport, not as authoritative server identity.
    - Fall back to out-of-band bootstrap channels (HTTPS to CDN, encrypted email, Atom feed over authenticated TLS) with certificate pinning so DNS-level manipulation cannot redirect clients to attacker-controlled infrastructure.
section: §6.4, §5.6
