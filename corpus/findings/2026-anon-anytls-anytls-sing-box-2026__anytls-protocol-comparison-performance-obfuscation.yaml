defense_implications:
    - AnyTLS's TCP/TLS transport makes it viable in environments where UDP is blocked outright (common in Iran and China during crackdowns), whereas Hysteria2/TUIC fail in those conditions — consider AnyTLS as a TCP-only fallback protocol.
    - The performance gap (medium vs. high/very-high) suggests AnyTLS trades throughput for stronger obfuscation; for high-bandwidth use cases, architects should route bulk traffic through Hysteria2 and use AnyTLS only for obfuscation-critical flows.
