defenses:
    - decoy-routing
defense_implications:
    - Design covert channels to be resumable across multiple distinct server connections so that connection termination by a censor does not kill the circumvention session.
    - Pre-provision session resumption credentials during the initial handshake so that cross-server failover incurs no additional user-visible latency.
