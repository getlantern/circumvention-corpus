paper: 2000-waldman-publius
kind: defense
summary: Publius's delete mechanism requires the publisher to supply H(server_domain · PW) per server rather than a bare password, preventing any single malicious server from learning the global password and deleting the document from all hosting servers. However, the paper acknowledges that an adversary who identifies the publisher can apply coercive ('rubber-hose') methods to obtain the URL and password directly from the author, bypassing all cryptographic protections.
techniques:
    - ip-blocking
defenses:
    - meta-resistance
censors:
    - generic
defense_implications:
    - Design deletion credentials as server-specific hashes (HMAC(server_id, secret)) rather than a single revocation token so that compromise of one server's credential cannot cascade to others.
    - Consider making deletion impossible by default (à la Anderson's Eternity Service) for the highest-risk content, accepting that the publisher cannot retract material once published.
section: §3.4, §5.5
