defense_implications:
    - Use Zcash shielded transactions as the preferred rendezvous channel when bandwidth is the binding constraint — 1148 bytes fits a Tor bridge descriptor plus public key in a single transaction at negligible cost.
    - Avoid Bitcoin as the primary rendezvous; its 20-byte challenge limit and $0.34 round-trip fee make it unsuitable for credential-bearing bootstrapping payloads without multi-transaction chaining.
