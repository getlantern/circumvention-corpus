    - ir
defense_implications:
    - Proxy servers must present a convincing cover identity (e.g., a real HTTPS response) to unauthenticated connections, not a generic error or timeout — any discriminating response allows the censor to confirm the server is a proxy without requiring a block event.
    - Warn users to use private/incognito browsing and avoid leaving browser sessions open across VPN reconnections, as cookie-based cross-session correlation can allow a censor controlling a monitored site to map multiple proxy IPs to a single user.
