defense_implications:
    - IP-based blocking (as used by Multimax/Turkey-aligned ISPs) is not bypassed by DNS resolver substitution alone; circumvention tools deployed in Turkish-aligned networks must also route around IP-level filtering via a proxy or VPN.
    - Tor Project and Psiphon infrastructure were explicitly IP-blocked on the Turkish-aligned ISP; circumvention tools serving these environments must not rely on well-known IP ranges associated with their own infrastructure and should use domain fronting or CDN egress.
