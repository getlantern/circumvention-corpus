defense_implications:
    - 'A two-layer defense is required in Gulf-state deployments: ECH/ESNI to defeat SNI blocking of HTTPS bootstrap, plus domain-fronting or meek-style tunneling to defeat HTTP-layer packet injection on mirror sites.'
    - ISP-level variation means circumvention tools must not conclude a country is universally blocked from a single vantage point—multi-AS sampling is necessary before classifying traffic as nationally censored.
