defense_implications:
    - Use the actual cover protocol natively (real SMTP via starttls) rather than a hand-crafted imitation; behavioral authenticity under DPI eliminates imitation-flaw detectors that exploit protocol inconsistency.
    - Select cover channels whose loss tolerance and delay tolerance match the proxy application's traffic profile; a mismatch enables censor interference that can stall connections without outright blocking them.
