defense_implications:
    - Obfuscating payload entropy alone is insufficient — IP/TCP header fields, packet sizes, and inter-packet timing retain independent discriminative signal that classifiers exploit separately; transports must normalize headers in addition to payloads.
    - Circumvention protocol benchmarks should include classifiers that disentangle header and payload branches rather than only evaluating unified byte-stream or flow-feature models.
