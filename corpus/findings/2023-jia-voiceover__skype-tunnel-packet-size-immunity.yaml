defense_implications:
    - Routing traffic through an actual VoIP application instance (rather than mimicking its traffic statistics) provides inherent packet-size normalization; prefer application-layer tunnels over statistical mimicry when the cover protocol normalizes sizes.
    - Cross-OS packet size CDF comparison is a practical validation step to confirm a multimedia tunnel's size distribution matches legitimate traffic before deployment.
