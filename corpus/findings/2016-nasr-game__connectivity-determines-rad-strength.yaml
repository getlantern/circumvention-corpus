defense_implications:
    - Scale decoy deployment budgets to the target censor's ring AS count rather than total AS count—ring ASes are the chokepoints through which RAD is exercised.
    - Against weakly-connected censors (Syria-class), even modest decoy budgets achieve high circumvention effectiveness; reserve larger deployments for densely-connected censors like China.
