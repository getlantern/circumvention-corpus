defense_implications:
    - DNS covert channels requiring a pre-shared user profile must plan a secure out-of-band bootstrap delivery mechanism (app installer, QR code, steganographic image) as a first-run step — this is a fundamental UX and scalability bottleneck to address in any production deployment.
    - The 2.3 MB bootstrap size is compressible; consider incremental or streaming profile delivery to reduce the initial distribution barrier without sacrificing per-user deniability guarantees.
