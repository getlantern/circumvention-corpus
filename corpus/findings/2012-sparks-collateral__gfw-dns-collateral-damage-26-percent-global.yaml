defense_implications:
    - DNS resolvers used by circumvention tools should be hardened against injection (DNSSEC validation, TCP-only queries, or use of resolvers with non-Chinese transit paths) — 26% of open resolvers globally are already poisoned.
    - Circumvention infrastructure in Iran, Malaysia, and Korea faces especially high DNS collateral-damage rates and must not rely on standard recursive resolution for bootstrapping.
