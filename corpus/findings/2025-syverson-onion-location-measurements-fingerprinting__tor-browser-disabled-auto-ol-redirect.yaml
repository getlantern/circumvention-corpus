defense_implications:
    - Removing automatic redirect reduces inadvertent fingerprinting exposure but does not eliminate OLF; tool designers should not treat user opt-in as a sufficient mitigation against guard-level traffic analysis.
    - Any browser feature that automatically opens a second tunnel (exit → onion) carrying overlapping content creates a correlated two-circuit fingerprint; audit new onion-discovery UX for this pattern before shipping.
