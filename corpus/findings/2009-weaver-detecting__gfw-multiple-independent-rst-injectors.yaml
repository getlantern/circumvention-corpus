    - packet-injection
censors:
    - cn
defense_implications:
    - Circumvention tools operating in China must handle multiple simultaneous RST injections per connection — ignoring one injector's RST is insufficient if a second injector fires independently on the same flow.
    - Device-level fingerprints (IPID constants, flag combinations, sequence increment patterns) can be used to build a blocklist for selectively dropping forged RSTs from known GFW injectors.
