defense_implications:
    - Use state-ISP-ownership data (CAIDA prefix-to-AS mappings combined with state-owned AS lists) and V-Dem democracy scores as pre-deployment risk signals to prioritize bridge and infrastructure placement in high-risk countries.
    - In state-controlled address-space environments, assume a single national operator can execute a total shutdown; design for multi-path diversity across non-state-owned ASes or out-of-band channels (satellite, cellular from non-state carrier).
