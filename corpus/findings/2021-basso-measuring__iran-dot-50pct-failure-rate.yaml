defense_implications:
    - DoT (port 853) is a high-risk transport for Iranian users; circumvention tools routing DNS through DoT should treat MCI as a hostile network and fall back automatically.
    - Failure rate alone is insufficient to characterize blocking — tool designers should instrument failure mode (connect vs. TLS handshake vs. post-handshake timeout) to distinguish IP blocking from SNI-based blocking.
