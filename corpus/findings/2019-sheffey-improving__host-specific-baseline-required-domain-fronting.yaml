defense_implications:
    - When training adversarial traffic shapers for domain-fronted transports, collect the baseline distribution from actual traffic to the specific CDN fronting host (not generic HTTPS) to avoid producing signatures that are statistically normal globally but anomalous for the specific host the censor observes.
    - Implement per-fronting-host traffic profiles in the shaper so that clients using meek-azure mimic ajax.aspnetcdn.com traffic patterns while clients using meek-gcp mimic GCS traffic patterns.
