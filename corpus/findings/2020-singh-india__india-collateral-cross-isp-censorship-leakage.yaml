summary: 'All detected HTTP censorship events in BSNL and MTNL are attributable to infrastructure shared with or operated by Airtel and ACT, demonstrating that upstream ISP filtering creates collateral censorship visible to downstream networks. Isolated cross-ISP leakage was also observed: Vodafone''s censorship notice appeared in 2 Jio tests, and Airtel''s appeared in 2 Vodafone tests.'
