summary: 'Dust eliminates the in-band key-exchange fingerprint surface via an out-of-band half-handshake: the server''s public key, IP, port, and a single-use secret are bundled into a PBKDF-encrypted invite packet transmitted out-of-band; only the decryption password (not the server IP) appears in plaintext, defeating the email/IM IP-address blocking attacks documented against prior systems.'
