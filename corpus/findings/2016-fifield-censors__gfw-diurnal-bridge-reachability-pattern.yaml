defense_implications:
    - Circumvention clients should implement automatic retry with backoff rather than treating a failed connection as permanently blocked; diurnal patterns mean a bridge that fails at one time of day may succeed hours later.
    - Monitoring bridge reachability at multiple times of day from multiple vantage points is necessary to distinguish permanent blocking from periodic enforcement gaps.
