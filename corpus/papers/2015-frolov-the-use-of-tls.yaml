id: 2015-frolov-the-use-of-tls
title: "The use of TLS in censorship circumvention"
authors:
  - Sergey Frolov
  - Eric Wustrow
venue: "NDSS"
year: 2019
doi: "10.14722/ndss.2019.23511"
url: "https://www.ndss-symposium.org/wp-content/uploads/2019/02/ndss2019_03B-3_Frolov_paper.pdf"
abstract: |
  We measure how circumvention tools use TLS, identify divergences from
  real browser fingerprints (the "uTLS" project), and evaluate the
  detectability of these fingerprints by a passive observer.

