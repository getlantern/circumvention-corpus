id: 2026-ermao-april-airport-outage
title: "2026年四月机场断线潮详解：通报、拔线与涨价预期下，普通用户该怎么应对 / Anatomy of the April 2026 China VPN-Reseller Outage Wave"
authors:
  - 二毛 (ermao)
venue: "ermao.net (Chinese-language circumvention blog)"
year: 2026
url: "https://www.ermao.net/blog/april-airport-outage-2026/"
abstract: |
  Operator-side write-up of the April 2026 wave of outages affecting
  commercial VPN brokers in China (机场, "airports" — colloquial for
  shared-infrastructure VPN resellers). Documents enforcement-driven
  capacity loss observed across the ecosystem: upstream resources
  being "reported" (通报) and "line-cut" (拔线) by authorities, with
  Ministry of Industry and Information Technology (工业和信息化部)
  bulletins cited as the visible enforcement mechanism. Reports
  cascading service degradation — disconnects, latency spikes, peak-
  hour throttling — as transit-style architectures (国内入口 + 海外转发)
  collapse to single-entry fallbacks under upstream loss. Forecasts
  continued capacity contraction through May 2026 with consequent
  price increases, fewer low-cost high-quality plans, and a shift
  toward month-by-month billing as users hedge against provider
  collapse.
