defense_implications:
    - Decoy routing deployments must explicitly surface the stealth/performance tradeoff; the 1.9–2.6× slowdown from stealth overt behavior is unavoidable under current designs and will affect user retention.
    - Predefined crawl URL lists that guarantee high covert goodput—rather than random link-following—could reduce loading-time variance without sacrificing the detectability gains from varied browsing patterns.
