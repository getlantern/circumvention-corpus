defense_implications:
    - Negative-sentiment reduction is not an effective evasion strategy for Chinese platform censorship; the operative signal is mobilization potential and informality, not emotional valence.
    - Circumvention guidance systems should not penalize negative or critical content per se, as the King et al. CAP finding (confirmed here linguistically) shows criticism alone does not predict removal.
