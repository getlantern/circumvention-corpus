defense_implications:
    - Circumvention tool deployments targeting diverse user communities will exhibit a natural coalition of high-resistance nodes (those most affected by the specific content being censored); designers should surface mechanisms that let those motivated nodes carry disproportionate relay load.
    - Expect that gradual throttling or partial blocking strategies by censors will suppress resistance in most of the network; only escalation past the utility-halving threshold mobilizes broad defense.
