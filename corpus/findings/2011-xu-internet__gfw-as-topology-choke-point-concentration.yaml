defense_implications:
    - The extreme concentration of international peering in two ISPs means censors can achieve near-total international blocking with a small number of policy changes at CHINANET and CNCGROUP — circumvention infrastructure must treat AS-level diversity as a first-class design requirement, not just IP diversity.
    - TTL-based IDS location fingerprinting is no longer viable against the GFW; circumvention measurement tooling must use TTL-incrementing ACK probes after triggering a reset, not passive TTL analysis of RST packets, to determine filtering device positions.
