    - cn
defense_implications:
    - Sending a syntactically plausible error response (e.g., a TLS Alert to a ClientHello) to at least one probe type would defeat this filtering step — but the response must be faithful enough to avoid committing the proxy to a protocol it cannot correctly speak.
    - Proxy designers must test non-response behavior against realistic ISP traffic distributions, not just controlled lab datasets, since the 94% elimination rate is vantage-point dependent.
