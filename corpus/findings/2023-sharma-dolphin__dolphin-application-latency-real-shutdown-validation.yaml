defense_implications:
    - Cellular-voice tunneling is viable for delay-tolerant applications (email, news snippets, short social posts) during complete Internet shutdowns where no IP-layer path exists.
    - Pre-configure session keys before a shutdown event to reduce the ~1-minute secure-channel setup cost; this is the dominant latency component for short messages.
