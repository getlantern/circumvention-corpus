defense_implications:
    - Censorship of a single IP can shift technique (RST → HTTP injection) and vary by AS within days; bootstrap probes must test both TCP-reset and application-layer injection, not just reachability.
    - Multi-vantage-point measurement is essential before declaring an IP 'safe' in CN — per-ASN heterogeneity means a resolver that works from one cloud region may be blocked from another.
