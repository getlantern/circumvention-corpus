defense_implications:
    - Darknet clusters must have multiple Opennet bridge nodes rather than a single gateway link; single-link attachment causes near-total routing failure (0.08% success) that defeats the availability goal of the private overlay.
    - When designing private-relay or bridge architectures, ensure the relay set is densely enough connected to the broader overlay to avoid isolated ID-space segments that black-hole routing.
