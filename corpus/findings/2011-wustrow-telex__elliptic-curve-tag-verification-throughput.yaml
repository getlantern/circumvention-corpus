defense_implications:
    - Elliptic-curve steganographic tagging is computationally cheap enough on commodity hardware that it can be deployed inline at ISP link speeds without dedicated crypto acceleration.
    - When evaluating in-path proxy designs, benchmark tag/flow classification throughput separately from connection relay throughput, as the cryptographic check is not the bottleneck.
