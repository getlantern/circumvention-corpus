summary: 'Anderson establishes that anonymity and physical redundancy are substitutes: ''Anonymity enables us to reduce diversity.'' Tamper-resistant hardware security modules controlling anonymized file servers ensure no identifiable group of people — including sysadmins — can locate or delete a specific file without breaking a quorum of hardware modules distributed across jurisdictions.'
