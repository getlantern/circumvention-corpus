defense_implications:
    - CDN-based circumvention (domain fronting) must account for prefix-level selectivity; not all CDN IPs are filtered, so operators should probe which prefixes are affected before deploying.
    - IP selection for proxy infrastructure in Iran should prefer providers and prefixes empirically confirmed as unaffected by the protocol filter.
