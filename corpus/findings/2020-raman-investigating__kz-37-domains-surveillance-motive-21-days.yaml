defense_implications:
    - Selective domain-list interception (rather than all-HTTPS blocking) means circumvention tools that route through popular-but-non-targeted domains or CDN fronts may avoid triggering the interception logic.
    - The longitudinal intermittency and tuning period suggest operators test interception systems in stages; circumvention tools should implement continuous self-testing to detect MitM conditions and switch to alternate paths or certificate-pinned channels.
