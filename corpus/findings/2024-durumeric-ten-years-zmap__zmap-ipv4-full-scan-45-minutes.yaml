defense_implications:
    - Proxy IP addresses are fully enumerable at Internet scale in under an hour — circumvention infrastructure must not rely on IP obscurity; rotate IPs frequently or use domain-fronting/CDN indirection.
    - Any static, long-lived proxy IP will appear in ZMap-derived blocklists; prefer ephemeral cloud IPs or IP ranges that are expensive to blocklist in bulk (shared CDN space, cloud provider ASNs).
