defense_implications:
    - A single high-profile blocking event can multiply active circumvention users by 6–7× almost overnight; capacity planning must treat censorship events as demand shocks, not gradual growth.
    - New gateway-effect users (80% Chinese-language preference, lower international exposure) differ demographically from pre-existing VPN users — circumvention tools should support localized UI and require no prior technical knowledge.
