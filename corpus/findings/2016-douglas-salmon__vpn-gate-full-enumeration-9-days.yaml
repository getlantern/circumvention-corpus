defense_implications:
    - Do not publish a queryable list of proxy servers in large batches; enumeration via the service's own infrastructure is trivial to automate and cannot be reliably detected as non-human.
    - Collective defense against scanning only works if the scanning vector itself cannot be proxied through the system under test — design distribution so servers are never handed to connections that could be reused for further enumeration.
