defense_implications:
    - National censorship infrastructure located at high-capacity IXPs with lax format validation can be weaponized as DDoS amplifiers — circumvention infrastructure operators should monitor for reflection attacks originating from GFW-adjacent IP ranges (China Telecom/Unicom/Mobile backbone) as a potential disruption vector against proxy servers.
    - The GFW's source IP diversity (traffic appears from China backbone IPs) makes inbound source-address validation ineffective at blocking these reflections — circumvention server hosting should not rely solely on IP blocklists for DDoS mitigation.
