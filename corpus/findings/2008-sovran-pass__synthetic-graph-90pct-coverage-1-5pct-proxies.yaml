defense_implications:
    - A proxy fraction of ~1.5% of total network size is sufficient for 90%+ user coverage when advertisements traverse short trust-graph routes; volunteer-recruitment targets should be calibrated to this density.
    - Geographic clustering in real social graphs reduces coverage — supplement random-route proxy distribution with relay hops to reach nodes lacking proxies in their immediate neighborhood.
