defense_implications:
    - Inject covert data after codec compression so the transport-layer cipher preserves ciphertext length, making packet-size distributions indistinguishable from those of legitimate video streams.
    - Choose carrier protocols whose encrypted payload field is both integrity-protected and size-preserving (e.g., SRTP stream cipher) to get encryption for free without payload expansion.
