defense_implications:
    - The Internet-wide resolver coverage confirms that DNS poisoning is not confined to a small set of ISPs; circumvention clients must assume any in-path resolver in CN/IR/RU is potentially compromised and default to encrypted or pinned resolution.
    - Measurement infrastructure using cert validation can serve as a canary for circumvention operators to detect when their own domain's DNS records have been hijacked by a censor.
