    - bridges
defense_implications:
    - Use many distributed rendezvous or introduction points per service so that blocking any single one does not take down the service—randomized sequences are key
    - Decouple the publicly-facing address (mailbox/bridge) from the actual service host so coercion of one does not expose the other
