defense_implications:
    - Circumvention tool operators should submit probe domains to commercial URL filter categorization APIs to audit whether their infrastructure is already categorized as 'proxy anonymizer'—blocking propagation takes only 3–5 days
    - Hosting circumvention endpoints on major cloud providers (AWS, GCP, Azure) makes it harder for vendors to reject categorization submissions without collateral damage to legitimate traffic
