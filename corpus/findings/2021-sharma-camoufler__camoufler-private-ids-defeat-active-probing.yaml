    - dpi
defenses:
    - tunneling
censors:
    - generic
defense_implications:
    - Distribute circumvention server identifiers (IM IDs, bridge addresses) exclusively through trusted out-of-band channels and configure servers to silently ignore or reject unauthenticated probe connections, eliminating the active-probing enumeration attack surface.
    - Layer application-level end-to-end encryption with PFS on top of any cover channel that uses E2M (provider-visible) encryption, so censor–provider collusion cannot expose plaintext or destination URLs.
