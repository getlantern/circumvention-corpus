defense_implications:
    - Prefer intersection or manually-authored regexes over auto-generated ones in production; the auto-http format's DFA has 13,815 states vs. 38 for manual-http and requires 184 MB for BuildTable, making it impractical for resource-constrained clients.
    - Set FTE format parameter m > 0 (raw AE ciphertext appended after the formatted prefix) to maximize goodput; formats with m=0 are constrained to the language's capacity alone and achieved only 1.9 Mbps vs. 42 Mbps for intersection-ssh at 100 MB file transfer.
