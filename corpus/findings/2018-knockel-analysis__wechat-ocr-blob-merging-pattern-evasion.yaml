defense_implications:
    - Render sensitive text with complex fill patterns — tiled letters are more effective than tiled squares — to fragment characters into blobs that defeat blob-merging OCR stages.
    - Use larger font sizes when applying blob-disruption techniques; smaller text has fewer blobs per character and reduces evasion effectiveness, as seen in the two 25-keyword failures.
