defense_implications:
    - Proxy placement decisions based on BGP-only topology will systematically undercount available transit ASes; incorporate traceroute and IXP membership data to avoid mis-ranking candidate deployment sites.
    - IXPs with many member ASes (e.g., DE-CIX Frankfurt) can serve as high-leverage single deployment points that intercept paths from multiple member ASes simultaneously.
