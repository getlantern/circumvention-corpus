notes: |
    UMass Amherst (Houmansadr group). Three pieces: local proxy,
    function refresher that regenerates bridges, live-migration for
    continuity. Claims 97% cost reduction vs IaaS-spot-instance state
    of the art and pitches the serverless platform's IP-pool churn +
    short-lived function lifecycle as inherent collateral-freedom
    protection (censors can't easily block cloud provider function
    egress IP ranges without breaking serverless customers).

    Directly relevant to lanturn's session-rotation + coturn-fleet-
    rotation patterns (design §6.1, §6.2) — same shape (rotate bridges
    to defeat IP enumeration) on a different substrate (serverless
    egress vs WebRTC TURN relays). Worth comparing infrastructure
    cost models — coturn-on-VPS-fleet vs Lambda-style serverless —
    when Lantern next reviews the egress cost story.

    Related to OBSCURA (2026-vilalonga-obscura-enabling-ephemeral) on
    the "ephemeral proxy" axis but solves a different problem (cost
    vs traffic shape).
