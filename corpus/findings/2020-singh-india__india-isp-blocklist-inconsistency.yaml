defense_implications:
    - India's decentralized, ISP-discretionary blocking regime means per-ISP reachability testing is essential before failing over to a circumvention proxy — a site unreachable on one ISP may be directly accessible on another.
    - Circumvention tools should implement ISP detection and route users on over-blocking ISPs (e.g., ACT) more aggressively to proxies than users on under-blocking ISPs (e.g., Airtel).
