defense_implications:
    - Embedding the covert stream in a random subset of the cover medium's native encoding blocks (H.264 macroblocks) is more robust than packet-level shaping alone, because it shifts the content statistics rather than just padding packets.
    - Expose a tunable steganography level parameter server-side so operators can trade video quality for security margin as censor sophistication changes without client updates.
