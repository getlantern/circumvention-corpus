paper: 2020-frolov-httpt
kind: evaluation
summary: 'HTTPT prototype performance is comparable to Shadowsocks: median Time-to-First-Byte was 612 ms for Shadowsocks, 844 ms for HTTPT (TLS 1.3, +1 RTT), and 1085 ms for HTTPT (TLS 1.2, +2 RTTs). Bandwidth overhead was approximately 2%: median time to fetch a 100 MB file was 24.65 s for Shadowsocks vs. 25.15 s for HTTPT.'
techniques:
    - active-probing
defenses:
    - mimicry
    - tunneling
defense_implications:
    - TLS 1.3 Zero Round Trip Resumption could eliminate HTTPT's 1-RTT TTFB penalty, but should be avoided because its infrequency on the Internet makes it a distinguisher and it enables replay attacks; accept the single extra RTT.
    - WebSocket framing overhead over TLS is negligible when popular web servers (nginx, Apache, Caddy) handle the TLS layer natively; this architecture avoids costly HTTP-safe encodings like base64.
