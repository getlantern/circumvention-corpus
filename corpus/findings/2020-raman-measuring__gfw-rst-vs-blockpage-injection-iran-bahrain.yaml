defense_implications:
    - Against GFW (CN), connection-reset evasion (e.g., Geneva-derived TCP manipulation, or transport-layer obfuscation) is load-bearing; blockpage-injection evasion is irrelevant.
    - Against IR/SA/BH, the filter is application-layer (HTTP/HTTPS) and injects HTML responses — mimicry transports that avoid triggering HTTP-layer keyword matches are more effective than pure entropy obfuscation.
