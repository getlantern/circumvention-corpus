abstract: Russian censors began blocking Snowflake (Tor's WebRTC-based pluggable transport) on 2026-03-30 by detecting and filtering DTLS ClientHello messages with specific JA3/JA4 fingerprints. Snowflake bandwidth data shows ~99% success before March 30 dropping to near-total failure for standard proxies. Community analysis demonstrates that randomizing DTLS ClientHello via covert-dtls library (under development by Tor Anti-Censorship team) bypasses the filter.
