defense_implications:
    - For any distributed proxy or bridge network, inter-node control-plane traffic must be anonymized separately from the data plane — metadata about which node holds what is often more sensitive than the data itself.
    - Add cover traffic / padding on inter-server channels to defeat timing and volume correlation; the cost is bandwidth overhead but the benefit is that passive traffic analysis cannot reconstruct the network topology.
