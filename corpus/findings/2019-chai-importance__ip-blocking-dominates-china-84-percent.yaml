defense_implications:
    - Tools relying solely on ESNI + DoH for circumvention will fail for ~84.5% of blocked destinations in China; proxy or decoy-routing architectures that hide the true destination IP remain indispensable.
    - ESNI should be treated as a layered complement to IP-hiding transports, not a standalone unblocking mechanism.
