defense_implications:
    - Any cover-protocol system transmitting non-native content over VBR-encoded channels (Skype, VoIP) must apply active traffic shaping — simply using the real transport layer is insufficient if payload statistics diverge from natural use.
    - The censor's required false-positive cost is the correct operationalizable security metric; target designs where blocking X% of circumvention traffic forces disruption of >20% of legitimate cover traffic.
