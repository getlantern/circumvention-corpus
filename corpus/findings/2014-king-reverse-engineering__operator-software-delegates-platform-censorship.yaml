defense_implications:
    - Because censorship enforcement is operator-configured rather than uniformly applied at the GFW layer, circumvention tools that route outside Chinese social media platforms bypass the operator-compliance layer entirely — a structural advantage over in-platform obfuscation.
    - Platforms with minimal operator configuration face much lighter automated filtering; when platform selection is possible, it functions as a partial circumvention strategy before any transport-layer tool is needed.
