summary: During the Belarus Internet shutdown of August 9, 2020, Censored Planet Echo measurements showed an increase of two orders of magnitude in test measurements failing at the TCP connection stage on the first day of the shutdown, alongside an order of magnitude increase in failed control measurements on the same day. Without comparing test measurements against control measurements that are expected to succeed regardless of content, these failures are indistinguishable from targeted website-level censorship.
