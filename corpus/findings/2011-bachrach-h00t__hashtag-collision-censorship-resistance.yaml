paper: 2011-bachrach-h00t
kind: defense
summary: '#h00t achieves censorship resistance by truncating a key-derivation-function output to k bits to produce a ''short tag'', deliberately inducing collisions across unrelated groups. A censor cannot block a targeted group''s short tag without simultaneously blocking all colliding groups — including innocuous, high-traffic ones — forcing heavy-handed censorship that creates domestic blowback. The design provides plausible deniability: subscribers can claim they follow a foreign pop star rather than a dissident group.'
