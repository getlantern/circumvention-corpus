notes: |
  Honest measurement of where ECH actually helps: Cloudflare is
  the only major provider supporting it; Russia censors ECH
  directly on Cloudflare ranges; China/Iran censor it indirectly
  by attacking encrypted DNS, which ECH depends on for the
  ECHConfig retrieval. The conclusion — "ECH alone is not enough,
  encrypted DNS must also resist censorship" — is the load-bearing
  citation for any Lantern design that wants to lean on ECH for
  SNI privacy.
