defense_implications:
    - Onion services used as circumvention infrastructure (bridges, hidden service frontends) must account for cheap availability attacks that don't trip congestion-based defenses — availability monitoring and fallback endpoints are essential.
    - Puzzle difficulty thresholds should not be the sole signal for service health; deploy independent liveness probes that can detect inflation attacks distinct from real congestion.
