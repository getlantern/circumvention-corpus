defense_implications:
    - Push-notification-based proxies must implement notification-rate shaping and request batching to keep per-app message frequency within normal usage distributions; unthrottled browsing (100+ notifications/page) is trivially fingerprintable.
    - Combine push notification tunneling with content prefetching or predictive loading to reduce the per-page notification count and blur the statistical signature.
