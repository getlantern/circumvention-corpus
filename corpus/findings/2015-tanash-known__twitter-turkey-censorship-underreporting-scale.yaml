defense_implications:
    - Platform-side content withholding is underreported by two orders of magnitude; tools that rely on official transparency reports to model censor behavior will systematically underestimate the threat surface.
    - Crawling the social graph outward from known-censored accounts is an effective method for discovering the true scope of censorship — circumvention researchers should build similar probing pipelines rather than trusting official disclosures.
