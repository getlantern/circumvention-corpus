summary: 'Alternative DNS resolvers trivially circumvent EU sanctions enforcement: third-party providers such as Google Public DNS and Cloudflare DNS implement no sanctions filtering regardless of user location, meaning any user who can switch their resolver can bypass most enforced blocks. The paper concludes that ''as long as a user can utilize an alternative DNS resolver, they would be able to bypass most sanctions enforcement.'''
