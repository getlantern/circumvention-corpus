defense_implications:
    - First-pass automated filters are brittle and bypassable with minor lexical variation (homophones, image text), but this does not defeat subsequent human review — circumvention tools must enable private channels that bypass platform submission entirely.
    - Two-thirds platform-side automated coverage means platform-agnostic encrypted messaging reaches users even on platforms without activated automated filtering, reducing dependence on any single platform's policy.
