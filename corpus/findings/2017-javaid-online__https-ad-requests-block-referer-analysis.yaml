defense_implications:
    - For split-path designs, configure the direct-path channel to enforce HTTPS-only connections to ad servers, eliminating the Referer leakage surface and reducing censor-observable correlation to destination IP only.
    - The ~18% of HTTP ad requests that leak Referer can be handled via IRS (route through a relay) without affecting overall ad relevance for the HTTPS majority.
