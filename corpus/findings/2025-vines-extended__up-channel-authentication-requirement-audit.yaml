defense_implications:
    - Audit existing rendezvous/bridge-distribution channels against the UP three-property checklist; any channel that requires user account creation or authentication introduces linkability risk and user-side friction that the UP model eliminates.
    - Plan for software-update delivery as a distinct, first-class requirement when designing circumvention infrastructure — the 2022 GFW fully-encrypted-traffic blocking event demonstrated that inability to push updates rapidly strands users even when working proxies exist.
