abstract: |
  76-page consortium report based on a nine-month indexing, translation,
  and analysis effort over the ~600 GB Geedge/MESA leak. Documents how
  China's domestic censorship infrastructure has been productized and
  exported through Geedge Networks to states including Myanmar, Pakistan,
  Ethiopia, and Kazakhstan, with technical detail on the Tiangou Secure
  Gateway (TSG) product line and its detection capabilities.

