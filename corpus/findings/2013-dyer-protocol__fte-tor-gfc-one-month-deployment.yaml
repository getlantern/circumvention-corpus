defense_implications:
    - Running FTE on port 80 with an HTTP format avoids the port-443 blacklist the GFW applied to the Tor bridge in the same experiment, suggesting that protocol-layer camouflage on a common port is more durable than bridge IP rotation alone.
    - FTE's regex-format negotiation allows switching target protocols per TCP connection; deploying a roster of formats (HTTP, SSH, SMB) and rotating among them raises the cost of censor-side fingerprinting of the circumvention tool itself.
