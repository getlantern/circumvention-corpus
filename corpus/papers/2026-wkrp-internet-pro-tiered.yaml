abstract: Iran has implemented 'Internet Pro', a permanent tiered-access system that blocks general population access to the global internet by default while offering selective international connectivity to approved business users (and officials) who apply through telecom operators with business credentials and accept premium rates (10x normal cost, ~$1–3 per GB). IODA measurements document this shift from temporary internet shutdowns to a normalized regime of IP-based selective access framed as 'internet sovereignty.' Community reports indicate VPN workarounds are prohibitively expensive, making circumvention economically unviable for most Iranians.
