defense_implications:
    - Circumvention tools bootstrapping in India must not rely on standard DNS resolution — use pre-distributed IP-literal server addresses or encrypted DNS (DoH/DoT) routed through a non-Indian resolver to avoid the 8 choke-point ASes.
    - DNS-based domain-fronting discovery or bridge distribution is particularly fragile in India; prefer out-of-band or IP-literal bootstrap mechanisms for any India-facing deployment.
