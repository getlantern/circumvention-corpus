defense_implications:
    - Measurement tools and circumvention clients that infer censor behavior from AAAA responses must account for the GFW's non-standard Teredo encoding; parsing these as valid IPv6 addresses will silently derive wrong destination IPs.
    - The one-to-one mapping between the IPv4 and Teredo IPv6 pools enables researchers to cross-validate injector datasets across A and AAAA record collection, improving completeness of GFW IP pool enumeration.
