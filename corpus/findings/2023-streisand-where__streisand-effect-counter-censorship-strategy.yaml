defense_implications:
    - Circumvention tool designers should consider public disclosure interfaces (diff views, highlighted deletions) as first-class features — transparency that exposes censorship is itself a form of counter-censorship that amplifies reach beyond users who would actively seek out blocked content.
    - Hosting transparency infrastructure on domains outside the censor's jurisdiction is critical, since censors will attempt to suppress the transparency tool itself (as evidenced by the book-censorship topic being cut from the case study).
