defense_implications:
    - Static bridge pools are fundamentally exhaustible; supplement proof-of-work rate-limiting with continuous pool replenishment so the creation-to-discovery rate stays positive.
    - Combine human-in-the-loop CAPTCHA with computational puzzles to ensure bulk automated harvesting cannot keep pace with pool rotation.
