defense_implications:
    - Reserve ~10% of the bridge pool as never-assigned backups specifically to absorb coordinated mass-blocking events analogous to crisis-driven shutdowns; release them automatically on a spike in unavailability reports.
    - Accept that ~10% of recently joined users will still lack bridges after a mass-blocking event because they joined too recently to accumulate replacement credits — design onboarding to front-load credit grants or provide a grace-period bridge.
