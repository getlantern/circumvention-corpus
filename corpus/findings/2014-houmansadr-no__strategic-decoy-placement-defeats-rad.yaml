defense_implications:
    - Prioritize decoy placement in high-customer-cone transit ASes rather than random ASes; sorted-no-ring placement dramatically amplifies censor cost per deployed decoy.
    - Exclude ring ASes (non-adversary ASes with direct business relationships with the censor) from decoy placement to prevent easy re-routing workarounds.
