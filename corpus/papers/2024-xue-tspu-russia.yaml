notes: |
  Definitive recent characterization of Russia's TSPU. If anyone on
  the team is reasoning about RU blocking, start here. Particularly
  important: TSPU is heterogeneous across ISPs, so test fixtures need
  per-ISP coverage, not a single "Russia" bucket. This shaped the
  bandit's per-ASN dimensioning decision.
