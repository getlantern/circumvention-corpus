defense_implications:
    - Any circumvention tool routing traffic through Chinese LLM APIs must warn users that query content and session metadata are transmitted to Chinese-state-linked ASes regardless of the user's geographic location.
    - Traffic analysis of Chinese LLM sessions should account for the persistent WebSocket telemetry channels (distinct from the SSE response stream) that leak conversation metadata — these channels cannot be blocked without breaking session functionality.
