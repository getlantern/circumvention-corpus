defense_implications:
    - Circumvention tools cannot rely on protecting only well-known domains — the GFW's blocklist is vast and targets obscure domains, so tools should function generically rather than via allowlists.
    - Censorship measurement must use continuously-refreshed TLD zone files rather than static top-N lists, which miss the majority of actually-censored domains.
