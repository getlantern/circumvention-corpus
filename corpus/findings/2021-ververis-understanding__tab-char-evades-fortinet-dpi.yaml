defense_implications:
    - Shallow HTTP-header manipulation (whitespace insertion, transmission delays) remains an effective first-pass evasion against commodity Fortinet-class DPI; circumvention tools should apply these transforms before attempting more costly tunneling.
    - The continued effectiveness of 2017-era HTTP evasion through 2020 suggests blocking infrastructure is rarely upgraded once deployed — document vendor-specific quirks and test them longitudinally.
