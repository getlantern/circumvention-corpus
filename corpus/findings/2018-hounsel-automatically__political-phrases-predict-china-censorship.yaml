summary: 'Culturally specific Chinese phrases are strong predictors of censorship: unigrams for controversial figures—Wang Qishan (74%), Li Hongzhi (64%), Guo Boxiong (62%), Hu Jintao (56%)—returned the highest block rates. Trigrams such as ''Beidaihe meeting'' (54%), ''CCP''s religious policy'' (42%), and ''Tiananmen Square demonstrations'' (32%) showed similar patterns, confirming King et al.''s finding that references to collective political dissent are disproportionately targeted.'
