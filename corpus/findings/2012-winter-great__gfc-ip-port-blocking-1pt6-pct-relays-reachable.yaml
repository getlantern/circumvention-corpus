    - port-blocking
defenses:
    - tor
    - bridges
censors:
    - cn
defense_implications:
    - Published relays and bridges will be enumerated and blocked quickly; distribute bridge addresses through out-of-band channels and treat each as single-use, rotating frequently.
    - Hosting proxy infrastructure on IPs shared with high-value legitimate services may delay blocking, but the IP:port granularity means the censor can still target the proxy port without affecting the co-located service.
