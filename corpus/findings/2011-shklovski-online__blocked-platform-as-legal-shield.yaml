summary: 'Some politically active bloggers in the studied country deliberately continued publishing on officially court-blocked platforms, reasoning that official blockage created a legal defense against persecution: ''if they say you wrote this on your blog, I will say all of these blogs are blocked according to this court decision—they don''t exist and they are officially inaccessible to citizens.'' This co-option of censor infrastructure as a shield was treated as a serious protective strategy.'
