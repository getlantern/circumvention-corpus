defense_implications:
    - Commercial DPI vendors (Fortinet, Cisco, Palo Alto, Juniper, Barracuda) are now the dominant blocking infrastructure across repressive regimes — circumvention tools must assume DPI-capable in-path filtering rather than IP-list or DNS-only blocking.
    - FilterMap's blockpage signatures are publicly available at censoredplanet.org/filtermap; protocol designers should use them to test that their traffic does not trigger the blockpage injection path for major commercial filter products.
