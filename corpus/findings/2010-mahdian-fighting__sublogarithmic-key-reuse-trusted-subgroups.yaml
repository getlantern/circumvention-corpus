defense_implications:
    - Reuse existing bridge credentials for confirmed-clean user subgroups rather than minting fresh bridges for every sub-cohort; this reduces bridge consumption by a log log n factor, materially lowering operational cost at scale.
    - The O(k) gap between the upper and lower bounds means there is room for further algorithmic improvement — current schemes are not proven optimal in their dependence on k.
