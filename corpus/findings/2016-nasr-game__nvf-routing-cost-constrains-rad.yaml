defense_implications:
    - Monitor BGP route changes for NVF-path adoption as an early warning signal that a censor has begun deploying RAD—this is observable from inside the circumvention network without requiring vantage points inside the censor's AS.
    - Design decoy AS sets that maximize the fraction of censor routes requiring NVF paths if RAD is applied, since the monetary cost of NVF routing deters even well-funded censors from sustaining RAD at scale.
