    - keyword-filtering
censors:
    - tr
defense_implications:
    - Political speech critical of the sitting government accounts for the overwhelming majority of targeted content — circumvention tools deployed in Turkey should be designed with the assumption that the user population is primarily political dissidents, not general privacy seekers.
    - Topic modeling of censored content is a viable intelligence method for identifying censor priorities and predicting future blocking targets; operators should build similar pipelines to anticipate which keywords or hashtags will trigger new blocking events.
