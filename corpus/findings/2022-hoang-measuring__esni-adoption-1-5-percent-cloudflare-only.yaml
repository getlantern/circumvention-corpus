defense_implications:
    - ECH/ESNI is only effective as a circumvention technique at scale — circumvention tools should co-host with or route through major CDNs (Cloudflare) that already carry large volumes of ESNI traffic to avoid statistical distinguishability.
    - Until ECH adoption reaches a critical mass of popular domains, tools relying solely on ESNI-based SNI hiding will be trivially blockable with minimal collateral damage to the censor.
