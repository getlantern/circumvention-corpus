defense_implications:
    - 'Target video/audio Simple Block elements (e.g., WebM element ID 0xa3) rather than images as the covert-channel leaf data in traffic-replacement systems: replacing video frames yields ~4x better overhead than image replacement while keeping the same traffic shape.'
    - Video buffering causes highly bursty data availability (min 78 kbps vs. max 2023 kbps); design covert-channel consumers to tolerate this variance, and prefer livestream sources over pre-recorded video to reduce buffer-fill pauses that create detectable inter-request timing gaps.
