defense_implications:
    - Automated keyword evasion (homophones, homographs, satire) defeats the keyword-blocking layer but not the manual censorship layer — circumvention tools that protect the channel but not the content still leave users exposed to post-publication deletion.
    - 'Design for ephemeral or push-delivered communication: since manual censors act after publication, tools that enable content to be consumed before censors can act (fast expiry, push delivery outside the platform) reduce interdiction surface.'
