defense_implications:
    - Design circumvention tools to prioritize topics with >10% censorship rates rather than optimizing for average-case ~1% censorship; the long tail of heavily censored topics is where tools matter most.
    - Keyword-filter evasion needs to be topic-aware and dynamically updated, since censorship intensity is driven by specific political events rather than a static blocklist.
