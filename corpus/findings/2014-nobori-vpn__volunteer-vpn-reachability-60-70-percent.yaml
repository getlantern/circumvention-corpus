defense_implications:
    - Combine partial server-list distribution (keyspace hopping) with decoy IP injection and distributed spy detection — no single technique alone achieves acceptable reachability; all three are load-bearing.
    - A ~40% daily IP churn rate among volunteer relays degrades censor blocking lists faster than they can be refreshed; design relay pools to maximize natural IP turnover rather than relying on fixed infrastructure.
