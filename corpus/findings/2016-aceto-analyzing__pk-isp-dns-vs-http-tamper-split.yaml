paper: 2016-aceto-analyzing
kind: evaluation
summary: 'Across five Pakistani ISPs measured over six months (Oct 2013–Mar 2014), censorship splits cleanly by ISP: WiTribe, PTCL, and Nayatel block via DNS tampering, while Wateen and Qubee block via HTTP content tampering. The two techniques do not overlap within a single ISP, demonstrating that Pakistan''s censorship infrastructure is ISP-heterogeneous rather than centrally normalized.'
