paper: 2018-hoang-empirical
kind: evaluation
summary: A blocking rate of more than 70% of I2P peer IP addresses is sufficient to cause significant latency in web browsing activities, while blocking more than 90% of peer IP addresses can make the I2P network unusable. The cost to reach the 95% blocking threshold is operating only 10 censor-controlled routers.
techniques:
    - ip-blocking
censors:
