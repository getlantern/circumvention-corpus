defense_implications:
    - ISP-layer circumvention tools (SNI bypass, DNS-over-HTTPS, TCP obfuscation) are entirely ineffective against server-side geo-blocking — tool designers must treat app-level filtering as a distinct threat model requiring different mitigations.
    - Measurement platforms that probe only ISP-layer blocking will produce false-negatives for server-enforced censorship; add application-layer probing to detection methodology.
