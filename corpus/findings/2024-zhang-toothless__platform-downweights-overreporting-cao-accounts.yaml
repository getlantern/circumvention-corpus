defense_implications:
    - Platform-side abuse detection creates a measurable adversarial dynamic that slows coordinated censorship; circumvention tool distribution via social media may survive longer if posts are less keyword-detectable and thus harder to fast-coordinate against.
    - Censor account pools are transient and sourced from civilian-looking accounts; automated detection of coordinated inauthentic reporting bursts is technically feasible and could expose censorship campaigns to platform trust-and-safety teams in near-real-time.
