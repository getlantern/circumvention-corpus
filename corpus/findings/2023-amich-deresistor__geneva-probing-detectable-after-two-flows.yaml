defense_implications:
    - Packet-manipulation strategy generators must minimize deviations in TCP header fields (data-offset, checksum, TTL, SYN options) from baseline benign traffic to avoid flow-level ML fingerprinting during the censor-probing phase.
    - Any tool that probes a censor repeatedly from the same IP is at risk of sequential-hypothesis-test IP blocking after as few as 2 anomalous flows — probing infrastructure should rotate source IPs or distribute probes across nodes.
