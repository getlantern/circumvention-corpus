name: deploy

# Auto-deploys the static site + MCP Pages Function to Cloudflare on
# every push to main.
#
# This workflow uses no event payload inputs in any run: step (no
# github.event.*, no github.head_ref). Secrets flow only through the
# `with:` block of the published cloudflare/wrangler-action, never
# interpolated into shell commands.
#
# Required GitHub repository secrets:
#   - CLOUDFLARE_API_TOKEN  — scoped to "Account.Cloudflare Pages: Edit"
#                             on account 1c693b3f1031ed33f68653b1e67dfbef
#   - CLOUDFLARE_ACCOUNT_ID — 1c693b3f1031ed33f68653b1e67dfbef

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: bundle corpus for Worker
        # Produces functions/_data/corpus.json — imported by functions/mcp/
        # at deploy time and inlined into the Worker bundle by Wrangler.
        run: go run ./cmd/corpus-bundle/ --corpus .
      - name: build static site
        run: go run ./cmd/corpus-site/ --corpus . --out dist
      - name: install TS deps for Worker typecheck
        run: npm ci || npm install
      - name: typecheck Worker
        run: npx tsc --noEmit
      - name: deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Wrangler picks up functions/ at the project root and compiles
          # it into the Pages deployment. dist/ is the static assets.
          command: pages deploy dist --project-name circumvention-corpus --branch main
