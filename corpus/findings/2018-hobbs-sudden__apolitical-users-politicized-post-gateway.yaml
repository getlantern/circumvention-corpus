defense_implications:
    - Circumvention tools need not rely on politically motivated users for growth; entertainment-driven adoption can scale the user base, with political engagement emerging organically post-onboarding.
    - Governments seeking to limit gateway effects should avoid sudden, blunt censorship of high-habit services — graduated or announced blocks give users time to find substitutes without acquiring general-purpose evasion tools.
