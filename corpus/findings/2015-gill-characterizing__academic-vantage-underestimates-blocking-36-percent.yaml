defense_implications:
    - Circumvention tool operators should instrument blocking detection from residential or mobile ISP probes rather than cloud or university VPS endpoints — academic vantage points will underestimate blocked surface area by roughly one-third.
    - Deployment studies that measure whether a transport is blocked using PlanetLab or datacenter nodes will systematically miss blocks that only appear on residential paths, leading to false confidence in a protocol's reachability.
