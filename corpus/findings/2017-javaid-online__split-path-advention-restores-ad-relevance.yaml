defense_implications:
    - A browser-extension PAC file is sufficient to implement split-path routing without modifying the underlying transport — publishers continue to see the relay IP while ad servers see the real client IP, requiring no changes to existing circumvention infrastructure.
    - Language-matched relay selection (IRS) recovers contextual ad relevance at the cost of a smaller anonymity set; tool designers should expose this as an opt-in trade-off rather than a default.
