notes: |
  Operational-intelligence value is enormous: leaked source/docs from
  GFW vendors reveal the *intent* and *implementation* of detection
  systems, not just their externally-observable behavior. Lantern
  protocol designers should treat this as a primary threat-model input.
  The blog-format public analysis is what we cite externally; if we
  ever obtain the raw leak files for internal study, they belong in
  circumvention-corpus-private with strict redistribution_terms (see
  README visibility model). The raw material has obvious legal/ethical
  handling concerns the team should reason about case by case.
