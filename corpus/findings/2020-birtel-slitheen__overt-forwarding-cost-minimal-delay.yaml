defense_implications:
    - Per-packet relay latency is not the binding constraint for decoy routing stealth; covert scheduling and overt behavior simulation contribute far more to detectable timing shifts than raw forwarding overhead.
    - Multi-threaded relay designs can introduce upstream latency spikes under burst load; a PISA-based line-rate implementation would eliminate this residual timing artifact and remove a detectable outlier signal.
