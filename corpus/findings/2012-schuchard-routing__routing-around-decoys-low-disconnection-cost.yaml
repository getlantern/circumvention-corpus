defense_implications:
    - 'Decoy routing availability guarantees based on random or Tier-1 AS deployment are insufficient: a warden simply steers BGP policy to prefer clean paths, so effective containment requires covering all paths simultaneously — a deployment cost that appears infeasible at Internet scale.'
    - Protocol designers relying on refraction/decoy routing must model the warden as an active BGP adversary, not a passive observer, and should evaluate 'all-paths covered' metrics rather than 'at least one path covered'.
