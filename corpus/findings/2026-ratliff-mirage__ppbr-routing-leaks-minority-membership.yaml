defense_implications:
    - Any mobility-aware routing protocol that makes accept/forward decisions based on private location profiles leaks those profiles through observable forwarding behavior — routing decisions must be differentially private, not just the underlying data.
    - Protocols that use silent acceptance (PPBR-style) without plausible deniability should be considered broken against adversaries who can observe subsequent message broadcasts.
