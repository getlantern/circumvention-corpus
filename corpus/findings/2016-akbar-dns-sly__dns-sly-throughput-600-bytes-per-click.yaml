defense_implications:
    - DNS covert channels can deliver usable bandwidth (~100 bytes/click median) for low-rate circumvention such as proxying text-reduced pages without triggering volume-based anomaly detectors.
    - Prefer global IP dictionaries over local ones for ~25% higher throughput when deployment permits, as the number of A records per response dominates capacity more than total pool size.
