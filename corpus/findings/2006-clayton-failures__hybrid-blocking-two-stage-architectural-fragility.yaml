summary: 'The hybrid two-stage design''s architectural vulnerability is that circumventing either stage independently defeats the system: end-users can tunnel via Tor or JAP to bypass both stages entirely, while content providers can serve different content to IWF crawlers versus real users, exploiting the fact that only 33% of IWF hotline reports were substantiated as potentially illegal. The system''s precision is entirely contingent on content-provider cooperation, which cannot be assumed.'
