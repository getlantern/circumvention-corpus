defense_implications:
    - Design WebRTC-based tunnels to enumerate multiple fallback carrier applications so that selective blocking of individual services does not disable the circumvention channel.
    - Prefer widely-deployed WebRTC services used for business (video conferencing, coding interviews) as carriers, since their economic importance creates a strong deterrent to wholesale blocking.
