abstract: On February 28, 2026, Iran experienced a near-complete internet shutdown (98% connectivity loss) following military strikes, affecting multiple provinces. Cloudflare Radar and IODA measurements revealed BGP route withdrawals and IP-space announcement collapse. The community discovered DNS-based tunneling (dnstt over port 53) was the only working circumvention method; participants shared public dnstt server configurations and experimented with different DNS resolvers and ISPs to maintain connectivity.
