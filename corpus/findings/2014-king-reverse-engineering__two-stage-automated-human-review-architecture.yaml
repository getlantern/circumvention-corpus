defense_implications:
    - Platform-level automated filtering operates before any URL is exposed; circumvention tools that only encrypt transport cannot protect content suppressed at the submission layer — client-side encryption before posting is the only effective defense.
    - The ~24-hour human-review window makes time-sensitive coordination content especially vulnerable; circumvention tools should support secure channels that bypass platform submission entirely rather than relying on posting-then-deleting strategies.
