defense_implications:
    - Selecting measurement or probe targets based on whether they appear in routine browsing traffic lowers the anomaly signal available to passive censor surveillance — the same principle applies to choosing cover-traffic domains for pluggable transports.
    - Restricting the domain set traded measurement breadth for user safety; circumvention tool designers face the same breadth-vs-risk tension when selecting rendezvous or front domains.
