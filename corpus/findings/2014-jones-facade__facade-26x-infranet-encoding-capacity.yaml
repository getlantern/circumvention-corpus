defense_implications:
    - Prefer covert channels that exploit high-entropy web service fields (search queries, POST bodies) over link-click schemes; search terms yield ~26× more upstream capacity than Infranet-style range mapping at equivalent deniability.
    - Benchmark covert-channel designs against both bits/URL and statistical deniability; throughput gains that eliminate deniability (as in StegoTorus) are not safe tradeoffs against strong adversaries.
