defense_implications:
    - Fingerprint the specific firewall vendor and version deployed by a censor before designing an evasion strategy — pre-handshake ACK forwarding or RST-spoofing behavior varies dramatically across implementations and invalidates generic assumptions.
    - Probe for RST-injection behavior early in protocol negotiation; a censor that actively spoofs RSTs will neutralize many evasion sequences that rely on out-of-order or pre-handshake packets.
