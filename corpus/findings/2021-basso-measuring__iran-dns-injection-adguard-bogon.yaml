defense_implications:
    - Circumvention tools must supply pre-resolved IP addresses for DoT/DoH bootstrap rather than relying on getaddrinfo, as DNS interception will redirect domain lookups to bogon addresses before TLS ever starts.
    - Using the service domain as the SNI in Iran triggers a second layer of blocking even after bypassing DNS injection; tools should either avoid the service's public hostname as SNI or use ECH.
