paper: 2011-mccoy-proximax
kind: defense
summary: 'Proximax frames proxy distribution as a yield-maximization problem: the expected yield of a proxy is its attracted usage Ui divided by its total blocking risk Λi. A dissemination channel should only be assigned a proxy if the channel''s own yield ratio u/λ exceeds the proxy''s current yield ratio; otherwise the added risk outweighs the additional traffic and the channel must not be used at all.'
