defense_implications:
    - Proxy servers must remain silent to unauthenticated connection attempts — any response (even an error) leaks existence to active probers; design servers to drop rather than reject.
    - Distribute the shared secret out-of-band (e.g., via BridgeDB or a separate channel) and bind it into the first-message MAC so the server can trivially distinguish a legitimate client from a probe without stateful tracking.
