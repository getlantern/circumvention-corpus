summary: A browser-history survey found that approximately 8% of domain name resolutions involved typing in a genuinely new domain not reachable via an existing link, meaning a SDSI/petname delegation-based name system could serve roughly 92% of real-world Web navigation without requiring any out-of-band key exchange.
