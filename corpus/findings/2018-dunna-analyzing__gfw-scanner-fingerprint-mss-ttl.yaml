defense_implications:
    - Scanner detection rules based on a single frequent IP will fail; fingerprint by TCP metadata (MSS, window scaling, TTL) rather than source IP.
    - The near-uniform one-scan-per-IP policy means any allowlist of known-safe IPs must whitelist the bridge's own test client, not scanner IPs.
