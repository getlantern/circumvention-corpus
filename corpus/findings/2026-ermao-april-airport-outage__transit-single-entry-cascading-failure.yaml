defense_implications:
    - Multi-hop relay architectures must distribute domestic entry points across independent ASNs and providers; a shared single entry is a single enforcement target that takes down all downstream nodes simultaneously.
    - Design fallback tiers so that loss of a relay entry gracefully degrades to direct-connect rather than total outage, and expose entry-point health to clients for automatic failover.
