defense_implications:
    - Geo-routing cannot be used to bypass Chinese LLM censorship — filter sets and server infrastructure are globally uniform, eliminating any geography-based circumvention path.
    - The absence of location-differentiated deployments means a single evasion technique (e.g., query perturbation) developed against any vantage point is immediately applicable to all global deployments of the same service.
