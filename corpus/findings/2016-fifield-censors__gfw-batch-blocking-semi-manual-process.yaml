defense_implications:
    - Bridge lifecycle management should treat batch blocking as the threat model—once one bridge in a release is blocked, all co-released bridges should be considered compromised and rotated.
    - Introducing bridges gradually across releases (rather than in large batches) limits the blast radius of a single blocking event.
