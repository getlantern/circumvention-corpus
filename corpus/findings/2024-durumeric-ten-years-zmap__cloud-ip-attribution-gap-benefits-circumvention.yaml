defense_implications:
    - Hosting circumvention infrastructure behind shared cloud or CDN IPs exploits the same measurement gap that makes ZMap attribution unreliable — blocking the IP collaterally blocks thousands of legitimate services, raising the political cost of blocking.
    - Domain-fronting and CDN-based tunneling derive their censor-resistance partly from this cloud measurement gap; as censors develop better cloud-attribution techniques, these defenses will need to evolve toward SNI-blind or ECH-protected variants.
