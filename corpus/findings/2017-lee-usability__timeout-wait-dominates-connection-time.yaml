defense_implications:
    - Connection timeout duration is a first-class UX parameter for censorship circumvention tools — aggressively short timeouts (or parallel probing of multiple bridges) directly reduce total time-to-connect under censorship.
    - Show per-component connection status (which hop is failing) on the progress screen so users can abort a doomed attempt early rather than waiting for a full timeout cycle.
