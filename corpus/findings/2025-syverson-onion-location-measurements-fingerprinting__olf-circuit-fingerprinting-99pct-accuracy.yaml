defense_implications:
    - The exit→HSDir→intro→rendezvous circuit-type sequence is sufficient for near-perfect fingerprinting from a single guard; any OA mechanism that produces this distinguishable sequence should be treated as broken from a traffic-analysis perspective.
    - Replace header-based O-L with local onion association (pre-downloaded OA list) so that onion access presents an indistinguishable pattern from any other onion service visit at the guard.
