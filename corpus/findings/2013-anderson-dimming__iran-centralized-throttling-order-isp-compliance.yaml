defense_implications:
    - Iran's centralized gateway architecture (all traffic routed through TCI/ITC AS12880) means a single throttling order can affect all users simultaneously; circumvention infrastructure should not rely on a single upstream path through the Iranian international gateway.
    - The compliance lag that smaller ISPs may exploit before throttling orders propagate suggests routing circumvention traffic through smaller regional ASNs could yield additional usable bandwidth during the initial hours of a suppression event.
