paper: 2025-sharma-cenpush
kind: defense
summary: |
  CenPush uses mobile platform push-notification services (APNs, FCM) as a
  blocking-resistant control channel for distributing fresh proxy IPs and client
  configuration to users in censored regions. Push notification infrastructure is
  already widely deployed, has high collateral-damage cost to block, and is a
  server-push channel — meaning the client never has to initiate a query to an
  out-of-band endpoint that a censor could block.
techniques: [ip-blocking]
defenses: [bridges, meta-resistance]
censors: [generic]
defense_implications:
  - "Integrate push-notification delivery (APNs/FCM) as a bootstrap and config-update
    channel for proxy IPs; censors cannot block it without disrupting all push-enabled
    apps on the platform."
  - "Design the control plane to be server-push rather than client-poll wherever
    possible: polled endpoints are blockable, push channels are not."
section: "§1, §3"
extracted_by: claude-sonnet-4-6
