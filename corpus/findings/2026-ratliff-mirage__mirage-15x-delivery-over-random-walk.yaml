defense_implications:
    - District-based gossip parameters derived from population-level mobility (rather than individual profiles) can achieve near-PPBR delivery rates without the privacy cost — the global mobility graph provides the routing signal without exposing individual patterns.
    - For mesh-based circumvention deployments, tuning the privacy parameter p closer to 0.6 rather than 0.5 yields 4× better delivery rates; the privacy-utility tradeoff is non-linear and the sweet spot is around ε ≈ 0.8–1.0.
