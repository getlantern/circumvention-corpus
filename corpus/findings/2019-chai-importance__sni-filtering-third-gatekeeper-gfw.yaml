defense_implications:
    - Circumventing SNI leakage (via ESNI or SNI omission) must be paired with encrypted DNS (DoH/DoT) and IP-hiding techniques to provide meaningful unblocking; any single-layer bypass is insufficient against layered GFW censorship.
    - The existence of separate GFW blacklists for SNI and DNS suggests censors can selectively upgrade blocking of a domain without immediately applying all techniques — designers should monitor for incremental escalation rather than assuming an all-or-nothing response.
