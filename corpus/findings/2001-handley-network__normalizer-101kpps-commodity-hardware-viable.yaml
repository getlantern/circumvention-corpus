defense_implications:
    - Normalization overhead is roughly 4× slower than raw packet copy, meaning inline DPI hardening via normalization was feasible on commodity hardware at 100 Mbps as of 2001 — with modern ASICs and line rates, assume normalizer-strengthened DPI is deployable by any well-resourced censor.
    - Circumvention strategies that depend on normalizers being too expensive to operate at line rate are not viable; protocol-ambiguity evasion must be assumed resolved before the censor's traffic classifier inspects a flow.
