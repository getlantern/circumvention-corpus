defense_implications:
    - Any covert channel that fully replaces cover-medium content with random bytes is trivially detectable by an adversary controlling the carrier service; designs must embed covert data in a way that preserves the perceptual and statistical properties of the original medium.
    - Out-of-band key exchange for endpoint authentication is mandatory when the carrier signaling infrastructure may be adversary-controlled; in-band key negotiation through censor-controlled servers provides no security.
