defense_implications:
    - Certificate pinning or out-of-band public-key verification is essential for detecting routing-layer MITM before transmitting sensitive data; protocol-layer encryption alone cannot defeat a censor that controls the transit path.
    - Include path-integrity checks (e.g., traceroute anomaly detection) in circumvention health monitoring — unexpected shortening of hop count or disappearance of international transit hops is a reliable signal of BGP-level hijacking.
