defense_implications:
    - Steganographic circumvention is viable for small payloads (articles, email) but impractical for video or large files at current encoding efficiencies; prioritize low-bandwidth use cases or invest in higher-efficiency embedding.
    - Traffic overhead from task execution (hundreds of KB per task) dominates message overhead at high blocking rates; reduce task overhead by pre-fetching cover vectors in background rather than on demand.
