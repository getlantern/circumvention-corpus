id: 2025-wu-regional-censorship
title: "A Wall Behind A Wall: Emerging Regional Censorship in China"
authors:
  - Mingshi Wu
  - Ali Zohaib
  - Zakir Durumeric
  - Amir Houmansadr
  - Eric Wustrow
venue: "IEEE S&P"
year: 2025
url: "https://gfw.report/publications/sp25/en/"
abstract: |
  We characterize a previously-unknown class of GFW deployment: regional
  censorship that operates inside China and applies different blocklists
  to different provinces. We focus on Henan province, where additional
  censorship is layered on top of the national GFW. The findings
  challenge the longstanding "national GFW" mental model of CN
  censorship and have implications for measurement methodology.

