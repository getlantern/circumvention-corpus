defense_implications:
    - Epidemic mesh routing tolerates a meaningful fraction of adversary-controlled relay nodes before coverage degrades below operational thresholds; designers should target adversary ratios well above 2% in threat models to establish true safety margins.
    - Message persistence time (ptm) and storage quotas are first-class protocol parameters that directly gate coverage under adversarial conditions; expose them as tunable knobs rather than hardcoding.
