defense_implications:
    - A bandwidth overhead of roughly 100% is near the efficiency frontier for adversarial padding — additional overhead above ~2× yields little marginal protection and degrades user experience; tune PT defaults to this range rather than maximizing overhead.
    - Even at 40% overhead the adversarial approach cuts WF accuracy nearly in half, making lightweight deployments viable for bandwidth-constrained users.
