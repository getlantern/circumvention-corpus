id: 2026-niere-dpyproxy-dns
title: "Towards Automated DNS Censorship Circumvention"
authors:
  - Niklas Niere
  - Felix Lange
  - Juraj Somorovsky
venue: "FOCI 2026 (Free and Open Communications on the Internet)"
year: 2026
url: "https://jonsnowwhite.github.io/page/files/foci_26_dns.pdf"
abstract: |
  Censorship is employed by many governments and ISPs worldwide,
  with an increasing trend in recent years. One of the most
  censored protocols is DNS: censors target unencrypted and
  encrypted DNS to prevent clients from resolving the domain name
  of unwanted websites. Despite much research on DNS censorship,
  only a few tools can circumvent it. To support users affected
  by DNS censorship, the authors present DPYProxy-DNS, a DNS
  resolver that automatically detects and employs a working DNS
  censorship circumvention. They demonstrate effectiveness in
  China and Iran. Their analyses reveal that DNS censorship in
  Iran is ineffective against encrypted DNS; in China, two
  consistently working circumvention techniques for unencrypted
  DNS are TCP segmentation for DNS over TCP, and ignoring DNS
  responses injected by the GFW.
