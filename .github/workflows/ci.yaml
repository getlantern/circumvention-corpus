name: ci

# This workflow uses no event payload inputs in any run: step (no
# github.event.*, no github.head_ref). Only the source tree at the PR
# head is used, via the standard checkout action.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        # -v surfaces the advisory output from TestPapersHaveFindings so
        # the missing-findings backlog is visible in every PR check.
        run: go test -v ./...
