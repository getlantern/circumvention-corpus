summary: 'Because Bangladesh''s ban targeted specific named applications rather than underlying protocols, users successfully substituted functionally equivalent but unlisted apps: ''Banning Facebook, Viber, and Whatsapp for security purposes was not sufficient. For example, I used IMO to operate those apps. So, ultimately, nothing happened.'' Authorities responded by expanding the blocklist to cover substitute apps, producing a reactive cat-and-mouse dynamic over the 26-day ban.'
techniques:
