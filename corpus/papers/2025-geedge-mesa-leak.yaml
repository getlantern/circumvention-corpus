abstract: |
  Analysis of leaked internal documentation and source code from
  Geedge Networks and the MESA lab at the Chinese Academy of Sciences,
  revealing internals of the GFW's surveillance and detection
  infrastructure. Largest known document leak from the GFW vendor
  ecosystem.

