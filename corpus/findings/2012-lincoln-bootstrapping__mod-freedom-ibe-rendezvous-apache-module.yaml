    - bridges
    - meta-resistance
defense_implications:
    - Piggyback bridge-address distribution onto high-traffic legitimate web servers using IBE so blocking the rendezvous channel requires collateral damage to widely-used sites.
    - Separate rendezvous-server operator trust from bridge-address knowledge — adversarial rendezvous servers can harvest only their daily NET allotment and must still pay the full CAPTCHA+proof-of-work cost to decode it.
