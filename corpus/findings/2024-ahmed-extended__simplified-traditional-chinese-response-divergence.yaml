defense_implications:
    - When building LLM-assisted circumvention or information-access tools, prompt in Traditional Chinese rather than Simplified Chinese to obtain less censorship-biased responses about politically sensitive topics.
    - Treat language-of-prompt as a proxy for training data provenance — Simplified Chinese responses may reflect CCP information-control requirements regardless of where the end user is located.
