paper: 2016-fifield-fingerprintability
kind: defense
summary: 'The authors extend Houmansadr et al.''s ''parrot is dead'' argument to WebRTC: because WebRTC is a large multi-protocol framework, superficial mimicry that fails to replicate exact DTLS version, cipher suite ordering, certificate common name (''WebRTC''), 30-day validity period, STUN server selection, and ICE packet sequence leaves detectable residual distinguishers, making deep fingerprint conformance especially hard for standalone non-browser implementations such as Snowflake''s client.'
