id: 2025-gfw-port443-rst
title: "Analysis of the GFW's Unconditional Port 443 Block on August 20, 2025"
authors:
  - "GFW Report team"
venue: "gfw.report"
year: 2025
url: "https://gfw.report/blog/gfw_unconditional_rst_20250820/en/"
abstract: |
  Analysis of an unusual GFW behavior observed on August 20, 2025: the
  GFW unconditionally injected TCP RSTs on port 443 traffic, regardless
  of payload, for a measurable window. Likely a misconfiguration or
  test deployment rather than a permanent change.

censors: [cn]
techniques: [rst-injection, port-blocking, dpi]
evaluation_methods: [measurement-study]

