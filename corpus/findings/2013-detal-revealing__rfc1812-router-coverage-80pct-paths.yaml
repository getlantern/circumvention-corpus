defense_implications:
    - Use tracebox-style active probing (incrementing TTL, comparing ICMP-quoted packets against originals) to audit paths for on-path interference before committing to a circumvention architecture; 80% path coverage makes pre-deployment audits operationally feasible.
    - Leverage RFC1812-compliant core routers as passive 'mirrors' to detect and localize censorship middleboxes in the access segment without needing control of the destination host.
