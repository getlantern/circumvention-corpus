defense_implications:
    - When building overlays on P2P networks, prefer designs where relay selection avoids adversary-controlled nodes (e.g., restrict supernodes to trusted/verified peers) to reduce metadata leakage.
    - Multiple relay hops within the overlay dramatically reduce supernode-correlation attack success at modest latency cost.
