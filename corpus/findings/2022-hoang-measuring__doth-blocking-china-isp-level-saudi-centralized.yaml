defense_implications:
    - Circumvention deployments using public DoH resolvers (Cloudflare 1.1.1.1, Google 8.8.8.8, Quad9) as their DNS backend will face blocking in China and Saudi Arabia; tools should fall back to private DoH resolvers running on non-standard ports hosted outside censored networks.
    - Hardcoded resolver IPs without DoH are susceptible to IP-level blocking; tools should support multiple resolver fallbacks and probe resolver availability at runtime.
