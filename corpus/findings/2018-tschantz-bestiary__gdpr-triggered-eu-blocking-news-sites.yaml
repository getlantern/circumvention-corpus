defense_implications:
    - Server-side geo-blocks triggered by compliance law (rather than political censorship) are indistinguishable at the network layer from government-mandated blocks — circumvention tools targeting 'censorship' must handle both classes or they will silently fail for users encountering compliance-motivated blocks.
    - HTTP 451 can be used as a programmatic signal to distinguish legal-compliance blocks from political censorship; incorporate status-code parsing into blockpage classifiers.
