defense_implications:
    - Censorship does not reduce demand for circumvention tools in high-censorship topics — users actively seek workarounds, so tool adoption friction is the primary barrier, not lack of motivation.
    - Prioritize usability and low-latency access over feature completeness; politically engaged users will use tools even under active keyword filtering if the tool is accessible.
