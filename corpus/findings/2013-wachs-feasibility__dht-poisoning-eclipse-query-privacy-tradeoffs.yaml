defense_implications:
    - Implement DHT value storage with mandatory signature verification to neutralize poisoning at near-zero cost; replicate each record across multiple DHT nodes to resist eclipse attacks.
    - Encrypt DHT queries with per-user secrets (label + zone key) so forwarding peers cannot read query content; apply onion routing over the DHT for full query unlinkability at the cost of added latency.
