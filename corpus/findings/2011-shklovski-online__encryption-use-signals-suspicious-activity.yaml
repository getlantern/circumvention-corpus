summary: 'A politically active blogger in an anonymized censored country explicitly avoided BlackBerry encryption stating: ''they can''t crack that encryption and they would just get suspicious. Cause they listen to me and listen to me and then suddenly I am encrypting and so that means I am really saying something they don''t want me to.'' This documents censor behavior where the mere use of strong encryption—independent of content—serves as a targeting signal.'
