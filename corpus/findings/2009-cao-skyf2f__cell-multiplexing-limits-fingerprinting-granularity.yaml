defense_implications:
    - Fixed-size cell multiplexing (à la Tor's 512-byte cells) partially defeats website fingerprinting by obscuring individual request/response boundaries; circumvention transports should consider cell-based framing as a low-cost fingerprinting countermeasure.
    - Multiplexing multiple streams over one tunnel makes per-flow fingerprinting ambiguous — favor designs that aggregate multiple user sessions into shared circuits.
