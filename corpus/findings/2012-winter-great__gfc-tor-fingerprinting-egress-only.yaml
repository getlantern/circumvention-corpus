defense_implications:
    - Circumvention servers operated inside China (e.g., for domestic staging or testing) would not trigger the same active-probing pipeline; however, this offers no practical protection for censored users who must route outbound.
    - Directional asymmetry suggests that server-initiated (reverse) connections or in-country relay hops could theoretically evade the border DPI, but such approaches face significant operational risks and are only useful in narrow topologies.
