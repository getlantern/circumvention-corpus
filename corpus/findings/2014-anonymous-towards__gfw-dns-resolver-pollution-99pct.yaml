defense_implications:
    - Deploying a resolver that filters responses containing known GFW Bad IPs provides lightweight censorship resistance without full tunneling.
    - Encrypted DNS (DoH/DoT) routed to external resolvers is the most reliable defense against GFW DNS pollution, as demonstrated by clean resolvers forwarding to Google/OpenDNS.
