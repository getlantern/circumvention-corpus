defense_implications:
    - Traffic transiting CNCGROUP faces a single centralized choke point; circuits routed through CHINANET provincial paths may encounter sparser, less uniformly deployed filtering — the four underserved provinces (Shaanxi, Gansu, Qinghai, Ningxia) account for only 2.5% of national IPs but may present lower filtering density.
    - 'Circumvention server placement should factor in per-ISP filtering architecture: CNCGROUP backbone concentration means a single policy change can blanket all CNCGROUP-transiting flows, whereas disrupting CHINANET coverage requires coordinating across 16+ provincial nodes.'
