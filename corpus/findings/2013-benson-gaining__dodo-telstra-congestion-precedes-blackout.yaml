defense_implications:
    - Early η elevation (>4 s) on a path to a proxy AS can serve as a predictive signal of imminent full blockage — circumvention clients should begin failover to alternate relays before the link goes completely dark.
    - A two-phase signature (congestion precedes blackout) can be detected with passive retransmit monitoring, giving circumvention infrastructure time to redistribute user load across providers.
