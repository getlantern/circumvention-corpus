defense_implications:
    - 'Circumvention tool threat assessments must be country-variant-specific: telco apps with identical branding can carry dramatically different permission sets and data-exfiltration behaviors depending on the target country.'
    - VPN/proxy tools should alert users when location-granting permissions are held by co-installed telco apps, since those apps may relay geolocation to ISP-adjacent servers outside the tunnel regardless of whether the circumvention tool is active.
