defense_implications:
    - Censorship measurement clients distributed to users in high-risk countries should tunnel probe traffic through the circumvention tool itself to prevent the user's ISP from observing direct requests to blocked URLs.
    - 'Treat measurement consent as contextually variable: use country-level risk scores (Freedom House, Economist Democracy Index, travel advisories) to gate which users are invited to run active probing.'
