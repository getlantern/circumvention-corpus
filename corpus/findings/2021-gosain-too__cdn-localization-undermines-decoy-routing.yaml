defense_implications:
    - Decoy routing implementations must not rely on Alexa-popular sites as overt destinations without verifying out-of-country hosting — 61–92% of those sites resolve to in-country CDN front-ends, so DR packets never cross the border to reach the decoy router.
    - Actively pre-screen overt-site candidates using RTT-based geolocation (not IP geolocation DBs) to confirm they are hosted outside the censor's boundary before including them in the overt-site pool.
