notes: |
  Paderborn syssec extends the same automated-circumvention
  posture from TLS (2025-niere-transport) to DNS — DPYProxy-DNS
  probes for working circumvention techniques and adapts. Two
  practical results worth surfacing: (1) Iran's DNS censorship is
  ineffective against encrypted DNS (DoT/DoH), so encrypted-DNS
  defaults are sufficient there; (2) in China, ignoring GFW's
  injected DNS responses (race-the-real-server) and TCP-segmenting
  DNS-over-TCP both consistently work.

  Implications for Lantern: validates encrypted-DNS-as-default for
  Iranian users; in China, the "ignore-injected-response" technique
  belongs in any DNS resolver that sits in-country.
