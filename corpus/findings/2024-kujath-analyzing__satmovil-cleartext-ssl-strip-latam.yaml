defense_implications:
    - Circumvention tools acting as VPN/proxy must transparently upgrade all HTTP to HTTPS or alert users when cleartext traffic leaks outside the tunnel — high-download government apps in high-risk regions routinely skip TLS enforcement.
    - Any circumvention infrastructure that delivers bootstrap or bridge links via SMS (e.g., Tor's bridges@torproject.org) should treat all SMS-delivered URLs as potentially downgraded by in-path telco infrastructure and require out-of-band integrity verification.
