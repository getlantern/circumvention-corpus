defense_implications:
    - Route circumvention registrations and data through large foreign encrypted providers so that censor-visible metadata is limited to a connection to a major CDN or mail provider, not the proxy endpoint.
    - Design the system so that blocking the circumvention infrastructure requires blocking the entire third-party provider, raising the political and economic cost to the censor.
