defense_implications:
    - Gaming communities in China represent a large pre-primed user base for circumvention tools — distribution via gaming channels reaches users who already have hands-on evasion experience and lower risk aversion.
    - Tools that serve both APS evasion (accessing international gaming platforms) and GFW circumvention in one package benefit from strong organic adoption; the dual use case is a feature, not a liability.
