defense_implications:
    - RST injection and silent drops by Russian transit ASes—undetected by blockpage-only measurements—may affect a larger set of IP ranges and countries than currently documented; circumvention protocol designers should not treat the 8-country finding as a ceiling when selecting relay paths.
    - Future relay routing audits should supplement blockpage scanning with RST/drop detection (e.g., using TTL-limited probes and path tomography) to obtain a complete picture of which Russian transit paths impose censorship risk.
