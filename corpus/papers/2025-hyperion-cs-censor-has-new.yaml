abstract: Russian censors deployed a new blocking technique on mobile networks that freezes TCP connections receiving more than 15-20KB of data from servers outside Russia. The technique uses DPI to detect TLS, IP geolocation checks to identify foreign servers, and maintains whitelists based on SNI values and CIDR blocks. Workarounds include SSH tunneling, using whitelisted SNI values with VLESS/Reality, or fragmenting responses across multiple connections.
