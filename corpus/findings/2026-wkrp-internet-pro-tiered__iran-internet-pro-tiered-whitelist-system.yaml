summary: 'Iran officially unveiled ''Internet Pro'' on April 14, 2026: a permanent tiered-access system granting selective unfiltered international connectivity to state actors and approved businesses at ~10x normal pricing (~$1–3/GB), while restricting the general population to the National Information Network (NIN). This institutionalizes what the regime frames as ''Internet Sovereignty,'' converting international access from a general right to a government-granted privilege.'
