defense_implications:
    - Censorship measurement probes embedded in widely-distributed web content should target only destinations already present as third-party resources on popular sites, to minimize distinguishable measurement footprint.
    - Circumvention tools seeking passive measurement coverage can leverage the ubiquity of CDN and social-media embedded content as cover traffic normalization, since blocking such traffic would constitute significant collateral damage for censors.
