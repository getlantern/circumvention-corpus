defense_implications:
    - Treat complete Internet shutdown as a distinct threat model requiring an out-of-band physical channel (cellular voice, SMS, satellite, mesh radio) rather than assuming any IP reachability.
    - Build pre-shutdown bootstrapping (key exchange, peer discovery, phone-number or frequency sharing) into tool design, since users cannot complete setup after connectivity is severed.
