defense_implications:
    - Circumvention tools should instrument blocking detection across multiple residential ASes per country before concluding a service is accessible nationally—datacenter-only probes systematically undercount real-user blocking.
    - Volunteer-distributed measurement infrastructure (analogous to VPN Gate) can serve as low-cost, high-coverage censorship telemetry for circumvention services to detect newly blocked relays or bootstrap servers.
