defense_implications:
    - Censors using keyword or hashtag sweeps will collaterally capture retweets at high rates (92%) — circumvention tools should warn users that retweeting censored content carries nearly the same risk as the original post.
    - The residual 8% uncensored originals suggest either human discretion or classifier error in the censor's pipeline — a signal that censor coverage is not 100% and targeted amplification of borderline content may sometimes survive.
