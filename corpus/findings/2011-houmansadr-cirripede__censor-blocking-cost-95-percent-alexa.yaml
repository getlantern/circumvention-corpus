defense_implications:
    - Route circumvention signaling through overt destinations drawn from high-collateral-damage sites (top Alexa tier) so that blocking the system requires the censor to accept catastrophic disruption of normal traffic.
    - Equip clients with a ranked fallback list of overt destinations and retry logic so a partial block only forces additional probing rather than total failure.
