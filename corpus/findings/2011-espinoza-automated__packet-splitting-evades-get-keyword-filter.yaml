defense_implications:
    - TCP segmentation at the application layer is a viable and low-complexity technique for evading router-level keyword filtering in China; circumvention tools can use deliberate packet fragmentation as a lightweight evasion layer for HTTP traffic.
    - Censorship measurement infrastructure must explicitly decouple backbone-layer and application-layer filtering when probing, or results from one layer will contaminate observations of the other.
