defense_implications:
    - Any practical DR deployment must budget for router-level deployment costs — not just AS-operator agreements — since even a 3-AS solution for a weak adversary requires over 1,000 hardware replacements.
    - DR architectures that minimize interception points per AS (e.g., operating only at a small set of heavy-hitter edge routers rather than all edge routers) could substantially reduce the capital cost identified here.
