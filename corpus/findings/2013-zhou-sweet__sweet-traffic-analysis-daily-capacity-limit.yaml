defense_implications:
    - Email-based covert channels are capacity-constrained by cover-traffic norms; designers must expose or document this ceiling to users and consider rate-limiting or batching to avoid behavioral anomalies.
    - For high-bandwidth use-cases, email tunneling is unsuitable; treat it as a high-availability fallback channel rather than a primary data path.
