    - rst-injection
    - keyword-filtering
censors:
    - cn
defense_implications:
    - The GFW's split infrastructure means that HRS vectors with partial success rates (~10–35%) may still be worth deploying if combined with retry logic — a single TCP RST does not guarantee all GFW nodes will block the connection.
    - None of the test vectors accepted by the latest Apache 2.4.57 or Nginx 1.25.2 circumvented the GFW, so HRS-based circumvention against China currently requires targeting servers running older or Nginx-derivative implementations.
