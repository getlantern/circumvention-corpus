defense_implications:
    - When IP-based bridge blocking is active, domain-fronting transports (meek/CDN-routed) are the only built-in options that survive — surface them first or exclusively in high-censorship modes rather than treating all transports as equivalent.
    - The effective bridge set under heavy censorship is much smaller than the configured set; tools should auto-probe bridge reachability and surface only working options to avoid user confusion and wasted timeouts.
