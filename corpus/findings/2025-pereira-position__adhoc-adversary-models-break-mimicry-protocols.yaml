defense_implications:
    - Mimicry protocols must be validated against application-aware adversaries that can induce behavioral probes (e.g., stall, reorder, inject) to surface invariant violations, not just passive traffic classifiers.
    - Security claims based solely on classifier accuracy on custom traffic traces should be treated as insufficient; formal distinguishability proofs against a parametric adversary are needed to bound real-world detectability.
