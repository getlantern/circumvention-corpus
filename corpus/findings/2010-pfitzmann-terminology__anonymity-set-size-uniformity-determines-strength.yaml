paper: 2010-pfitzmann-terminology
kind: defense
summary: 'Global anonymity is maximized when the anonymity set is large and behavior is uniformly distributed: ''global anonymity is maximal iff all subjects within the anonymity set are equally likely.'' Strong global anonymity does not protect individual ''likely suspects'' — even in a strong-anonymity system, one user with distinctive behavior may have weak individual anonymity. Strong or even maximal global anonymity does not imply strong anonymity of each particular subject.'
