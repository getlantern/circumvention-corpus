defense_implications:
    - Treat DNS and HTTPS/SNI-layer blocking as the fastest-growing threat vectors when prioritizing transport design; the data show these two methods account for the dominant share of new censorship deployments across more than 100 countries.
    - Do not limit proxy infrastructure planning to countries explicitly labeled 'Not Free'; significant and growing censorship infrastructure now exists in nominally free countries, requiring broader geographic distribution of bridge/relay endpoints.
