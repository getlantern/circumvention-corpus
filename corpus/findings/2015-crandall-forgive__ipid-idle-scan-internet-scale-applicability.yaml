defense_implications:
    - Use IPID idle scans to verify whether a circumvention server's traffic is being dropped by a censor without requiring any software on the client-side vantage point.
    - Do not rely on IPID side channels for IPv6 reachability verification; use fragment cache or ICMP rate-limit side channels instead.
