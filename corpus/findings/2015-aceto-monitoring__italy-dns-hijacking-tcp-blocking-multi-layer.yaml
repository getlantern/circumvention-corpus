defense_implications:
    - File-sharing circumvention in Italy requires evasion at both DNS and TCP layers simultaneously, whereas gambling-site users need only DNS-layer fixes — tools should probe both layers and activate only the minimal necessary evasion stack.
    - Academic and research network exemptions (GARR in Italy was uncensored) represent low-censorship access paths worth identifying and advertising to users with institutional network access.
