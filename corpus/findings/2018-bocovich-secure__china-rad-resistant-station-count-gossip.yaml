defense_implications:
    - Concentrate deployment of expensive inline-blocking relay stations on the downstream path where coverage impact per station is disproportionately high — 5 downstream stations achieve 78% route coverage against China.
    - Use lightweight upstream gossip taps (requiring no inline blocking) to defend against BGP-based Routing Around Decoys attacks at scale, making RAD attacks prohibitively expensive for the censor without burdening ISPs.
