defense_implications:
    - BGP routing-table datasets systematically undercount domestic AS peering in censored countries; censorship measurement studies must supplement with active in-country RIPE Atlas–style probing to avoid blind spots in topology.
    - Circumvention infrastructure placement decisions based solely on public BGP data may miss locally available ISPs and peering points that could serve as lower-latency or less-monitored relay candidates.
