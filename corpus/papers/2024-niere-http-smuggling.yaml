notes: |
  Same group, same posture: re-purpose a "vulnerability" into a
  circumvention primitive. HTTP request smuggling — a parser-
  divergence between front-end and back-end — turns out to be a
  reliable evasion technique against in-line HTTP censors that
  parse only one of the two ways. Demonstrates that censor parsers
  are themselves attack surface, not just neutral observers.

  General methodological lesson worth quoting: "censorship-
  circumvention techniques can successfully be constructed from
  existing vulnerabilities."
