defense_implications:
    - Circumvention tools targeting Pakistan must independently address both DNS injection and HTTP-layer tampering, since different ISPs choose different blocking layers for the same target — a DNS-only fix leaves HTTP-tampering ISPs unremedied.
    - Use multi-layer probing (DNS plausibility + TCP reachability + content-size ratio) rather than any single signal, since ISP-level diversity causes any one test to produce false negatives on the others.
