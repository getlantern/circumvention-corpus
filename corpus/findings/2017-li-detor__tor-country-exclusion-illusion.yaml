summary: 'Tor''s built-in country-exclusion feature provides only the illusion of control: among circuits configured to exclude the US, only 12% could be identified as definitively avoiding US territory. The remaining 88% of ''trusted'' circuits fail to deliver a proof of avoidance, meaning standard Tor policy and provable security diverge sharply.'
