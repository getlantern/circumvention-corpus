notes: |
  Tooling rather than a circumvention paper, but it's the
  measurement infrastructure that the upb-syssec group's
  circumvention papers are built on top of (the 38 TLS-layer
  evasion techniques in 2025-niere-transport were discovered by
  scripting TLS-Attacker against TLS servers and live censors).
  Worth keeping in the corpus as the citation any future
  TLS-circumvention research will reach for.
