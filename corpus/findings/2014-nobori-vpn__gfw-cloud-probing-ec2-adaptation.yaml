defense_implications:
    - IP-based blocklisting of censor probe sources is a short-lived defense — censors will trivially switch to cloud-provider IPs; invest instead in behavioral detection (connection pattern anomalies) that is cloud-source-agnostic.
    - 'Fixed polling intervals and scripted user agents are detectable signals, but treat them as temporary: design spy detection around call-completion behavior rather than HTTP metadata the censor can trivially vary.'
