defense_implications:
    - Circumvention tools must produce traffic that is statistically indistinguishable from ambient plaintext or common TLS flows; a sudden shift to high-entropy or novel-protocol traffic by a known user is itself a detection surface
    - Deploy always-on obfuscation rather than opt-in encryption, so there is no behavioral delta the censor can correlate with political activity
