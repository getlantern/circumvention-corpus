defense_implications:
    - Circumvention tools operating under DNS-blocking regimes (not DPI-based) should default to encrypted resolver alternatives rather than the ISP resolver; this single change defeats the dominant enforcement mechanism.
    - Where DPI is absent, resolver selection is more impactful than transport obfuscation—prioritize it accordingly in threat-model-driven design decisions.
