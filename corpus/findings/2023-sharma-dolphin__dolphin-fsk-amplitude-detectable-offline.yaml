summary: 'FSK-encoded Dolphin audio is distinguishable from normal human speech via offline amplitude analysis: Dolphin''s mean signal amplitude is 0.4 (std 224) versus 205 (std 1590) for natural speech — approximately an order of magnitude lower — enabling classification by a telecom operator who records calls. The paper also notes that standard CRC checksums appearing periodically every chunk provide a unique detectable signature if the adversary attempts to decode the audio.'
