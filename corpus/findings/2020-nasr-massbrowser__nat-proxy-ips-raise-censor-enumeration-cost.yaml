    - active-probing
defenses:
    - bridges
defense_implications:
    - Prefer residential or NATed IPs for relay deployment to maximize collateral-damage cost of IP blocking; dedicated datacenter IPs can be enumerated and blocked with no collateral damage.
    - Tie proxy pool growth to user growth (via client-to-client proxying) so that as adoption increases, the cost of complete enumeration rises proportionally.
