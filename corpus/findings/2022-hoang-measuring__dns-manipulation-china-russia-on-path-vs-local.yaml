defense_implications:
    - Circumvention tools should route DNS through encrypted resolvers hosted on non-standard ports and IPs not associated with known public resolvers, since major public DoTH resolvers are actively blocked in China and monitored in Russia.
    - Measurement infrastructure distinguishing on-path poisoning (multiple simultaneous responses) from local-resolver tampering (single forged response) enables more accurate circumvention routing decisions — tools should implement analogous detection.
