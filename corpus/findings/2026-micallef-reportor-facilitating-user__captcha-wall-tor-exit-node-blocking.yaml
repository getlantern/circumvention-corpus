summary: 'CAPTCHAs co-occurred with ''Resource Inaccessible'' in 70% of CAPTCHA reports and appeared in 23% of all ''Resource Inaccessible'' reports; overall 14% of the 119 reports involved one or both problems. Two CAPTCHA failure modes were identified: excessive repetitive CAPTCHAs and broken CAPTCHA servers that made the underlying website permanently inaccessible. The ''Unusual traffic detected from your computer'' Google error appeared in 5% of all reports.'
