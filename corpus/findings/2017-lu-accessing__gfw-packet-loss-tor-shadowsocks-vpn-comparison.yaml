defense_implications:
    - Protocols detectable by both DPI and active probing (Tor, Shadowsocks) suffer compounding packet loss; designs should address both attack surfaces simultaneously rather than treating them as independent problems.
    - A 4.4% PLR for Tor-with-meek versus 0.21% for layer-2 VPN quantifies the gap between GFW-targeted and non-targeted protocols — use this baseline when evaluating new transport designs against the GFW.
