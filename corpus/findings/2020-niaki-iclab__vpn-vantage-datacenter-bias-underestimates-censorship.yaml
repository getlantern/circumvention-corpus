defense_implications:
    - Circumvention tools tested only from data-center IP space will underestimate blocking rates on residential ISPs; validate transport reachability from residential or mobile vantage points before concluding a protocol is unblocked in a target country.
    - Overt block pages propagate uniformly across AS types, but covert blocking likely does not; tools should probe for silent connection drops and RST injection — not just block page delivery — when assessing reachability from a new IP range.
